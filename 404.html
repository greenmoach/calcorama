<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#a18cd1">
<title>404 — 找不到頁面 | 夢幻計算機大全</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 25%, #c2e9fb 50%, #fbc2eb 75%, #a18cd1 100%);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  color: #4a3060;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: 24px;
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(161, 140, 209, 0.2);
}

.error-code {
  font-size: 6rem;
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.emoji {
  font-size: 3rem;
  margin-bottom: 16px;
}

h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: #4a3060;
}

p {
  font-size: 1rem;
  color: #6b5080;
  margin-bottom: 32px;
  line-height: 1.6;
}

.btn-home {
  display: inline-block;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  color: white;
  text-decoration: none;
  padding: 14px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1rem;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
}

.btn-home:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(161, 140, 209, 0.5);
}
</style>
</head>
<body>

<div class="card">
  <div class="error-code">404</div>
  <div class="emoji">🧮</div>
  <h1>找不到頁面</h1>
  <p>您要找的頁面不存在或已被移除。<br>請回到首頁繼續使用我們的計算工具。</p>
  <a href="/" class="btn-home">🏠 回到首頁</a>
</div>

<a href="https://www.anthropic.com/claude" target="_blank" rel="noopener"
   style="position:fixed;bottom:16px;right:16px;z-index:10;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.55);border-radius:16px;padding:5px 11px;color:rgba(100,60,150,0.8);text-decoration:none;font-size:0.75rem;font-weight:600;font-family:'Nunito',sans-serif;">
  🤖 由 Claude AI 協助建置
</a>

</body>
</html>
