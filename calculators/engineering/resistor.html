h1{text-align:center;color:#6c5ce7;font-size:1.6rem;font-weight:800;margin-bottom:24px;}

.resistor-body::before,.resistor-body::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:40px;height:6px;background:#aaa;}
.resistor-body::before{left:-40px;}
.resistor-body::after{right:-40px;}
.band{width:18px;height:54px;border-radius:3px;transition:background-color .3s;box-shadow:inset 0 0 4px rgba(0,0,0,0.2);}
.band:nth-child(4){margin-left:20px;}

<a href="../../index.html" style="position:fixed;top:18px;left:18px;z-index:10;color:#6c5ce7;text-decoration:none;font-weight:700;font-size:0.95rem;">&#10094; 返回首頁</a>

<div class="card">
<h1>電阻色環計算機</h1>

<div class="selectors">
<div>
<label>第一環（十位數）</label>
<select id="band1" onchange="calculate()">
<option value="0" data-color="#000000">黑 (0)</option>
<option value="1" data-color="#8B4513" selected>棕 (1)</option>
<option value="2" data-color="#FF0000">紅 (2)</option>
<option value="3" data-color="#FF8C00">橙 (3)</option>
<option value="4" data-color="#FFD700">黃 (4)</option>
<option value="5" data-color="#228B22">綠 (5)</option>
<option value="6" data-color="#0000FF">藍 (6)</option>
<option value="7" data-color="#8B00FF">紫 (7)</option>
<option value="8" data-color="#808080">灰 (8)</option>
<option value="9" data-color="#FFFFFF">白 (9)</option>
</select>
</div>
<div>
<label>第二環（個位數）</label>
<select id="band2" onchange="calculate()">
<option value="0" data-color="#000000" selected>黑 (0)</option>
<option value="1" data-color="#8B4513">棕 (1)</option>
<option value="2" data-color="#FF0000">紅 (2)</option>
<option value="3" data-color="#FF8C00">橙 (3)</option>
<option value="4" data-color="#FFD700">黃 (4)</option>
<option value="5" data-color="#228B22">綠 (5)</option>
<option value="6" data-color="#0000FF">藍 (6)</option>
<option value="7" data-color="#8B00FF">紫 (7)</option>
<option value="8" data-color="#808080">灰 (8)</option>
<option value="9" data-color="#FFFFFF">白 (9)</option>
</select>
</div>
<div>
<label>第三環（倍率）</label>
<select id="band3" onchange="calculate()">
<option value="1" data-color="#000000">黑 (&times;1)</option>
<option value="10" data-color="#8B4513">棕 (&times;10)</option>
<option value="100" data-color="#FF0000" selected>紅 (&times;100)</option>
<option value="1000" data-color="#FF8C00">橙 (&times;1K)</option>
<option value="10000" data-color="#FFD700">黃 (&times;10K)</option>
<option value="100000" data-color="#228B22">綠 (&times;100K)</option>
<option value="1000000" data-color="#0000FF">藍 (&times;1M)</option>
<option value="10000000" data-color="#8B00FF">紫 (&times;10M)</option>
<option value="0.1" data-color="#CFB53B">金 (&times;0.1)</option>
<option value="0.01" data-color="#C0C0C0">銀 (&times;0.01)</option>
</select>
</div>
<div>
<label>第四環（容差）</label>
<select id="band4" onchange="calculate()">
<option value="1" data-color="#8B4513">棕 (&plusmn;1%)</option>
<option value="2" data-color="#FF0000">紅 (&plusmn;2%)</option>
<option value="5" data-color="#CFB53B" selected>金 (&plusmn;5%)</option>
<option value="10" data-color="#C0C0C0">銀 (&plusmn;10%)</option>
<option value="20" data-color="#e8d5b0">無 (&plusmn;20%)</option>
</select>
</div>
</div>

<div class="resistor-visual">
<div class="resistor-body">
<div class="band" id="vBand1"></div>
<div class="band" id="vBand2"></div>
<div class="band" id="vBand3"></div>
<div class="band" id="vBand4"></div>
</div>
</div>

<div class="result-box">
<div class="result-value" id="resultValue">1 K&Omega;</div>
<div class="result-tolerance" id="resultTolerance">&plusmn;5%（950 &Omega; ~ 1.05 K&Omega;）</div>
</div>
</div>

<script>
function getColor(sel){
  var opt=sel.options[sel.selectedIndex];
  return opt.getAttribute('data-color');
}

function formatResistance(ohms){
  if(ohms>=1000000){
    var v=ohms/1000000;
    return parseFloat(v.toFixed(4))+' M\u03A9';
  }
  if(ohms>=1000){
    var v=ohms/1000;
    return parseFloat(v.toFixed(4))+' K\u03A9';
  }
  return parseFloat(ohms.toFixed(4))+' \u03A9';
}

function calculate(){
  var b1=parseInt(document.getElementById('band1').value);
  var b2=parseInt(document.getElementById('band2').value);
  var multiplier=parseFloat(document.getElementById('band3').value);
  var tolerance=parseFloat(document.getElementById('band4').value);

  var resistance=(b1*10+b2)*multiplier;

  document.getElementById('vBand1').style.backgroundColor=getColor(document.getElementById('band1'));
  document.getElementById('vBand2').style.backgroundColor=getColor(document.getElementById('band2'));
  document.getElementById('vBand3').style.backgroundColor=getColor(document.getElementById('band3'));
  document.getElementById('vBand4').style.backgroundColor=getColor(document.getElementById('band4'));

  // Add border for white bands
  var bands=['vBand1','vBand2','vBand3','vBand4'];
  var sels=['band1','band2','band3','band4'];
  for(var i=0;i<4;i++){
    var c=getColor(document.getElementById(sels[i]));
    document.getElementById(bands[i]).style.border=(c==='#FFFFFF'||c==='#e8d5b0')?'1px solid #ccc':'none';
  }

  document.getElementById('resultValue').textContent=formatResistance(resistance);

  var minR=resistance*(1-tolerance/100);
  var maxR=resistance*(1+tolerance/100);
  document.getElementById('resultTolerance').textContent=
    '\u00B1'+tolerance+'%\uFF08'+formatResistance(minR)+' ~ '+formatResistance(maxR)+'\uFF09';
}

calculate();
</script>
