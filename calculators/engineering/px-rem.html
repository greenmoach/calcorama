<h1>PX&#8596;REM 換算計算機</h1>

<div class="base-row">
<div class="field">
<label>基準字體大小（Root Font Size）</label>
<input type="number" id="baseSize" value="16" min="1" step="1" oninput="calculate()">
</div>
</div>

<div class="convert-row">
<div class="field">
<label>PX 值</label>
<input type="number" id="pxInput" placeholder="輸入 PX" step="any" oninput="pxToRem()">
</div>
<div class="arrow">&#8594;</div>
<div class="field">
<label>REM 結果</label>
<div class="result" id="remResult">—</div>
</div>
</div>

<div class="convert-row">
<div class="field">
<label>REM 值</label>
<input type="number" id="remInput" placeholder="輸入 REM" step="any" oninput="remToPx()">
</div>
<div class="arrow">&#8594;</div>
<div class="field">
<label>PX 結果</label>
<div class="result" id="pxResult">—</div>
</div>
</div>

<h2>常用換算表</h2>
<table>
<thead><tr><th>PX</th><th>REM</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
var commonPx=[8,10,12,14,16,18,20,24,28,32,36,40,48,56,64];

function getBase(){
  var v=parseFloat(document.getElementById('baseSize').value);
  return(isNaN(v)||v<=0)?16:v;
}

function pxToRem(){
  var base=getBase();
  var px=parseFloat(document.getElementById('pxInput').value);
  if(isNaN(px)){document.getElementById('remResult').textContent='—';return;}
  var rem=px/base;
  document.getElementById('remResult').textContent=parseFloat(rem.toFixed(6))+' rem';
}

function remToPx(){
  var base=getBase();
  var rem=parseFloat(document.getElementById('remInput').value);
  if(isNaN(rem)){document.getElementById('pxResult').textContent='—';return;}
  var px=rem*base;
  document.getElementById('pxResult').textContent=parseFloat(px.toFixed(4))+' px';
}

function buildTable(){
  var base=getBase();
  var tbody=document.getElementById('tableBody');
  tbody.innerHTML='';
  for(var i=0;i<commonPx.length;i++){
    var px=commonPx[i];
    var rem=px/base;
    var tr=document.createElement('tr');
    var td1=document.createElement('td');td1.textContent=px+'px';
    var td2=document.createElement('td');td2.textContent=parseFloat(rem.toFixed(6))+' rem';
    tr.appendChild(td1);tr.appendChild(td2);
    tbody.appendChild(tr);
  }
}

function calculate(){pxToRem();remToPx();buildTable();}
buildTable();
</script>
