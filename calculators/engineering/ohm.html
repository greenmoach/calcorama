<div class="card">
<h1>歐姆定律計算機</h1>
<p class="subtitle">V = I &times; R &nbsp;&mdash;&nbsp; 填入任意兩個值，計算第三個</p>

<div class="triangle">
<svg class="tri-svg" viewBox="0 0 200 180">
<polygon points="100,10 10,170 190,170" fill="none" stroke="#a29bfe" stroke-width="3" stroke-linejoin="round"/>
<line x1="10" y1="170" x2="190" y2="170" stroke="#a29bfe" stroke-width="3"/>
<line x1="100" y1="90" x2="100" y2="170" stroke="#d0c0e8" stroke-width="2" stroke-dasharray="4"/>
<text x="100" y="60" text-anchor="middle" font-family="Nunito" font-weight="800" fill="#6c5ce7" font-size="22">V</text>
<text x="55" y="150" text-anchor="middle" font-family="Nunito" font-weight="800" fill="#6c5ce7" font-size="22">I</text>
<text x="145" y="150" text-anchor="middle" font-family="Nunito" font-weight="800" fill="#6c5ce7" font-size="22">R</text>
</svg>
</div>

<div class="field">
<label>電壓 V（伏特）</label>
<input type="number" id="voltage" placeholder="留空由系統計算" step="any">
<span class="unit">V</span>
</div>
<div class="field">
<label>電流 I（安培）</label>
<input type="number" id="current" placeholder="留空由系統計算" step="any">
<span class="unit">A</span>
</div>
<div class="field">
<label>電阻 R（歐姆）</label>
<input type="number" id="resistance" placeholder="留空由系統計算" step="any">
<span class="unit">&Omega;</span>
</div>

<button class="btn" onclick="calculate()">計算</button>
<button class="btn btn-clear" onclick="clearAll()">清除全部</button>
<div class="error" id="error"></div>

<div class="results" id="results" style="display:none;">
<div class="result-item">
<span class="result-label">電壓 (V)</span>
<span class="result-val" id="resV">—</span>
</div>
<div class="result-item">
<span class="result-label">電流 (I)</span>
<span class="result-val" id="resI">—</span>
</div>
<div class="result-item">
<span class="result-label">電阻 (R)</span>
<span class="result-val" id="resR">—</span>
</div>
<div class="result-item">
<span class="result-label">功率 (P = V&times;I)</span>
<span class="result-val" id="resP">—</span>
</div>
</div>
<p class="hint">提示：填入任意兩個值即可計算</p>
</div>

<script>
function formatNum(n){
  if(n===null||n===undefined||isNaN(n))return '—';
  if(Math.abs(n)>=1000000)return parseFloat((n/1000000).toFixed(4))+' M';
  if(Math.abs(n)>=1000)return parseFloat((n/1000).toFixed(4))+' K';
  if(Math.abs(n)<0.001&&n!==0)return parseFloat((n*1000).toFixed(4))+' m';
  return parseFloat(n.toFixed(6)).toString();
}

function calculate(){
  var vStr=document.getElementById('voltage').value.trim();
  var iStr=document.getElementById('current').value.trim();
  var rStr=document.getElementById('resistance').value.trim();
  var errEl=document.getElementById('error');
  errEl.textContent='';

  var v=vStr===''?null:parseFloat(vStr);
  var i=iStr===''?null:parseFloat(iStr);
  var r=rStr===''?null:parseFloat(rStr);

  // Count provided values
  var count=(v!==null?1:0)+(i!==null?1:0)+(r!==null?1:0);
  if(count<2){errEl.textContent='請至少填入兩個值';return;}

  // Validate numbers
  if((v!==null&&isNaN(v))||(i!==null&&isNaN(i))||(r!==null&&isNaN(r))){
    errEl.textContent='請輸入有效的數字';return;
  }

  if(v!==null&&i!==null&&r===null){
    if(i===0){errEl.textContent='電流不可為零（無法計算電阻）';return;}
    r=v/i;
  }else if(v!==null&&r!==null&&i===null){
    if(r===0){errEl.textContent='電阻不可為零（無法計算電流）';return;}
    i=v/r;
  }else if(i!==null&&r!==null&&v===null){
    v=i*r;
  }else{
    // All three provided - just show results
  }

  var p=v*i;

  document.getElementById('resV').textContent=formatNum(v)+' V';
  document.getElementById('resI').textContent=formatNum(i)+' A';
  document.getElementById('resR').textContent=formatNum(r)+' \u03A9';
  document.getElementById('resP').textContent=formatNum(p)+' W';
  document.getElementById('results').style.display='block';
}

function clearAll(){
  document.getElementById('voltage').value='';
  document.getElementById('current').value='';
  document.getElementById('resistance').value='';
  document.getElementById('error').textContent='';
  document.getElementById('results').style.display='none';
}
</script>
