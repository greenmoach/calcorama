<h1>資料容量換算</h1>

<div class="input-row">
<div class="field-val">
<label>輸入數值</label>
<input type="number" id="inputVal" value="1" step="any" min="0" oninput="convert()">
</div>
<div class="field-unit">
<label>單位</label>
<select id="inputUnit" onchange="convert()">
<option value="0">Bytes</option>
<option value="1">KB</option>
<option value="2" selected>MB</option>
<option value="3">GB</option>
<option value="4">TB</option>
<option value="5">PB</option>
</select>
</div>
</div>

<h2><span class="section-label">二進位</span> 1024 進位制（IEC）</h2>
<table>
<thead><tr><th>單位</th><th>值</th></tr></thead>
<tbody id="binaryTable"></tbody>
</table>

<h2><span class="section-label">十進位</span> 1000 進位制（SI）</h2>
<table>
<thead><tr><th>單位</th><th>值</th></tr></thead>
<tbody id="decimalTable"></tbody>
</table>
</div>

<script>
var binaryUnits=[
  {name:'Bytes',abbr:'B',power:0},
  {name:'KiB (Kibibytes)',abbr:'KiB',power:1},
  {name:'MiB (Mebibytes)',abbr:'MiB',power:2},
  {name:'GiB (Gibibytes)',abbr:'GiB',power:3},
  {name:'TiB (Tebibytes)',abbr:'TiB',power:4},
  {name:'PiB (Pebibytes)',abbr:'PiB',power:5}
];

var decimalUnits=[
  {name:'Bytes',abbr:'B',power:0},
  {name:'KB (Kilobytes)',abbr:'KB',power:1},
  {name:'MB (Megabytes)',abbr:'MB',power:2},
  {name:'GB (Gigabytes)',abbr:'GB',power:3},
  {name:'TB (Terabytes)',abbr:'TB',power:4},
  {name:'PB (Petabytes)',abbr:'PB',power:5}
];

// Input unit powers are in 1024-based
var inputPowers=[0,1,2,3,4,5];

function formatNumber(n){
  if(n===0)return '0';
  if(n>=1&&n<1e15){
    var s=n.toFixed(10);
    // Remove trailing zeros after decimal
    if(s.indexOf('.')!==-1){
      s=s.replace(/\.?0+$/,'');
    }
    // If number is very large, use locale string
    if(n>=1000){
      var parts=s.split('.');
      parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
      return parts.join('.');
    }
    return s;
  }
  if(n<0.000001)return n.toExponential(6);
  return parseFloat(n.toFixed(10)).toString();
}

function convert(){
  var val=parseFloat(document.getElementById('inputVal').value);
  var unitIdx=parseInt(document.getElementById('inputUnit').value);
  if(isNaN(val)||val<0){
    clearTables();return;
  }

  // Convert input to bytes (binary 1024-based)
  var bytes=val*Math.pow(1024,inputPowers[unitIdx]);

  // Binary table
  var bTbody=document.getElementById('binaryTable');
  bTbody.innerHTML='';
  for(var i=0;i<binaryUnits.length;i++){
    var u=binaryUnits[i];
    var converted=bytes/Math.pow(1024,u.power);
    var tr=document.createElement('tr');
    if(u.power===inputPowers[unitIdx])tr.classList.add('highlight');
    var td1=document.createElement('td');td1.classList.add('unit-name');td1.textContent=u.name;
    var td2=document.createElement('td');td2.textContent=formatNumber(converted);
    tr.appendChild(td1);tr.appendChild(td2);
    bTbody.appendChild(tr);
  }

  // Decimal table
  var dTbody=document.getElementById('decimalTable');
  dTbody.innerHTML='';
  for(var i=0;i<decimalUnits.length;i++){
    var u=decimalUnits[i];
    var converted=bytes/Math.pow(1000,u.power);
    var tr=document.createElement('tr');
    var td1=document.createElement('td');td1.classList.add('unit-name');td1.textContent=u.name;
    var td2=document.createElement('td');td2.textContent=formatNumber(converted);
    tr.appendChild(td1);tr.appendChild(td2);
    dTbody.appendChild(tr);
  }
}

function clearTables(){
  document.getElementById('binaryTable').innerHTML='';
  document.getElementById('decimalTable').innerHTML='';
}

convert();
</script>
