.frac-box{display:flex;flex-direction:column;align-items:center;gap:2px}
.frac-box input{width:70px;padding:8px;border:2px solid #e0b0d0;border-radius:10px;text-align:center;font-size:1.1rem;font-family:'Nunito',sans-serif;outline:none;transition:border .2s}

.op-select{padding:10px;border:2px solid #e0b0d0;border-radius:10px;font-size:1.2rem;font-family:'Nunito',sans-serif;background:#f8e1f0;color:#7b3f8a;cursor:pointer}
.op-label{font-size:1.5rem;color:#d4789c;font-weight:700}
button{display:block;margin:16px auto 0;padding:12px 40px;background:linear-gradient(135deg,#d4789c,#a18cd1);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}

<a href="../../index.html" style="position:fixed;top:18px;left:18px;z-index:10;color:#d4789c;text-decoration:none;font-weight:700;font-size:0.95rem;">&#10094; 返回首頁</a>

<span class="heart" style="bottom:12%;left:8%;animation-delay:2.5s">&#9829;</span>
<div class="card">
<h1>&#128290; 分數計算機</h1>
<div class="frac-row">
  <div class="frac-box">
    <input type="number" id="n1" placeholder="分子">
    <div class="frac-line"></div>
    <input type="number" id="d1" placeholder="分母">
  </div>
  <select class="op-select" id="op">
    <option value="add">+</option>
    <option value="sub">−</option>
    <option value="mul">×</option>
    <option value="div">÷</option>
  </select>
  <div class="frac-box">
    <input type="number" id="n2" placeholder="分子">
    <div class="frac-line"></div>
    <input type="number" id="d2" placeholder="分母">
  </div>
</div>
<button onclick="calc()">計算</button>
<div class="result" id="result" style="display:none">
  <div class="result-frac">
    <span class="num" id="rn"></span>
    <span class="line"></span>
    <span class="den" id="rd"></span>
  </div>
  <div class="result-decimal" id="rdec"></div>
</div>
</div>
<script>
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){let t=b;b=a%b;a=t}return a}
function simplify(n,d){if(d===0)return[NaN,NaN];if(n===0)return[0,1];let g=gcd(n,d);n/=g;d/=g;if(d<0){n=-n;d=-d}return[n,d]}
function calc(){
  let n1=parseInt(document.getElementById('n1').value)||0;
  let d1=parseInt(document.getElementById('d1').value);
  let n2=parseInt(document.getElementById('n2').value)||0;
  let d2=parseInt(document.getElementById('d2').value);
  if(!d1||!d2){alert('分母不可為零或空白');return}
  let op=document.getElementById('op').value;
  let rn,rd;
  if(op==='add'){rn=n1*d2+n2*d1;rd=d1*d2}
  else if(op==='sub'){rn=n1*d2-n2*d1;rd=d1*d2}
  else if(op==='mul'){rn=n1*n2;rd=d1*d2}
  else{rn=n1*d2;rd=d1*n2}
  let[sn,sd]=simplify(rn,rd);
  document.getElementById('rn').textContent=sn;
  document.getElementById('rd').textContent=sd;
  document.getElementById('rdec').textContent='≈ '+(sn/sd).toFixed(6);
  document.getElementById('result').style.display='block';
}
</script>
