<h1>質因數分解計算機</h1>
<p class="subtitle">質因數分解 ＋ 判斷是否為質數</p>
<label for="num">正整數（2 以上）</label>
<input type="number" id="num" placeholder="例如：360" min="2" step="1">
<button class="calc-btn" onclick="calculate()">分解</button>
<div class="result" id="result">
  <div class="prime-label">質因數分解結果</div>
  <div class="prime-expr" id="rExpr"></div>
  <div id="rTags"></div>
  <div class="is-prime" id="rIsPrime"></div>
</div>
</div>
<script>
function primeFactors(n){
  var factors={};
  for(var d=2;d*d<=n;d++){
    while(n%d===0){factors[d]=(factors[d]||0)+1;n=Math.floor(n/d);}
  }
  if(n>1)factors[n]=(factors[n]||0)+1;
  return factors;
}
function calculate(){
  var n=parseInt(document.getElementById('num').value);
  if(!n||n<2){alert('請輸入 2 以上的正整數');return;}
  var factors=primeFactors(n);
  var keys=Object.keys(factors);
  var expr=keys.map(function(k){return factors[k]>1?k+'<sup>'+factors[k]+'</sup>':k;}).join(' × ');
  document.getElementById('rExpr').innerHTML=n+' = '+expr;
  var tags=keys.map(function(k){return '<span class="prime-tag">'+k+(factors[k]>1?'<sup>'+factors[k]+'</sup>':'')+'</span>';}).join('');
  document.getElementById('rTags').innerHTML=tags;
  var isPrime=keys.length===1&&factors[keys[0]]===1;
  document.getElementById('rIsPrime').textContent=isPrime?n+' 是質數':n+' 不是質數';
  document.getElementById('result').style.display='block';
}
</script>
