<div class="card">
<h1>&#128202; 統計計算機</h1>
<label>輸入數據</label>
<textarea id="data" placeholder="例如：10, 20, 30, 40, 50">10, 20, 30, 40, 50</textarea>
<div class="hint">請用逗號分隔數字</div>
<button onclick="calc()">計算統計量</button>
<div class="result" id="result" style="display:none"></div>
</div>
<script>
function calc(){
  let raw=document.getElementById('data').value;
  let nums=raw.split(/[,\s]+/).map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n));
  let r=document.getElementById('result');
  if(nums.length===0){r.style.display='block';r.innerHTML='<div style="text-align:center">請輸入有效數字</div>';return}
  nums.sort((a,b)=>a-b);
  let n=nums.length;
  let sum=nums.reduce((a,b)=>a+b,0);
  let mean=sum/n;
  let median;
  if(n%2===0)median=(nums[n/2-1]+nums[n/2])/2;else median=nums[Math.floor(n/2)];
  let freq={};nums.forEach(v=>{freq[v]=(freq[v]||0)+1});
  let maxFreq=Math.max(...Object.values(freq));
  let modes=Object.keys(freq).filter(k=>freq[k]===maxFreq).map(Number);
  let modeStr=maxFreq===1?'無（所有值出現次數相同）':modes.join(', ');
  let range=nums[n-1]-nums[0];
  let variance=nums.reduce((s,v)=>s+(v-mean)*(v-mean),0)/n;
  let sd=Math.sqrt(variance);
  let html='';
  const row=(l,v)=>'<div class="stat-row"><span class="stat-label">'+l+'</span><span class="stat-value">'+v+'</span></div>';
  html+=row('資料筆數',n);
  html+=row('平均數 (Mean)',mean.toFixed(4));
  html+=row('中位數 (Median)',median.toFixed(4));
  html+=row('眾數 (Mode)',modeStr);
  html+=row('全距 (Range)',range.toFixed(4));
  html+=row('變異數 (Variance)',variance.toFixed(4));
  html+=row('標準差 (SD)',sd.toFixed(4));
  html+=row('總和',sum.toFixed(4));
  r.innerHTML=html;r.style.display='block';
}
</script>
