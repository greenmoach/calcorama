<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>單位換算計算機</h1>
<p class="subtitle">長度 / 重量 / 溫度 / 面積 / 體積</p>
<label for="category">類別</label>
<select id="category" onchange="updateUnits()">
  <option value="length">長度</option>
  <option value="weight">重量</option>
  <option value="temperature">溫度</option>
  <option value="area">面積</option>
  <option value="volume">體積</option>
</select>
<label for="fromUnit">從</label>
<select id="fromUnit"></select>
<label for="inputVal">數值</label>
<input type="number" id="inputVal" placeholder="輸入數值" step="any">
<label for="toUnit">換算至</label>
<select id="toUnit"></select>
<button class="calc-btn" onclick="convert()">換算</button>
<div class="result" id="result">
  <div class="result-row"><span class="result-label" id="rLabel"></span><span class="result-value" id="rValue"></span></div>
</div>
</div>
<script>
var units={
  length:{公尺:1,公里:1000,公分:0.01,毫米:0.001,英吋:0.0254,英尺:0.3048,碼:0.9144,英里:1609.344,海里:1852},
  weight:{公克:1,公斤:1000,毫克:0.001,公噸:1e6,磅:453.592,盎司:28.3495,台斤:600,台兩:37.5},
  area:{平方公尺:1,平方公里:1e6,平方公分:0.0001,平方英尺:0.092903,公頃:10000,英畝:4046.86,坪:3.30579},
  volume:{公升:1,毫升:0.001,立方公尺:1000,立方公分:0.001,加侖:3.78541,品脫:0.473176,杯:0.236588}
};
function updateUnits(){
  var cat=document.getElementById('category').value;
  var keys=cat==='temperature'?['攝氏(°C)','華氏(°F)','開爾文(K)']:Object.keys(units[cat]);
  ['fromUnit','toUnit'].forEach(function(id){
    var sel=document.getElementById(id);
    sel.innerHTML=keys.map(function(k){return '<option>'+k+'</option>';}).join('');
  });
  document.getElementById('toUnit').selectedIndex=1;
}
function convert(){
  var cat=document.getElementById('category').value;
  var v=parseFloat(document.getElementById('inputVal').value);
  if(isNaN(v)){alert('請輸入數值');return;}
  var from=document.getElementById('fromUnit').value;
  var to=document.getElementById('toUnit').value;
  var result;
  if(cat==='temperature'){
    var c;
    if(from==='攝氏(°C)')c=v;
    else if(from==='華氏(°F)')c=(v-32)*5/9;
    else c=v-273.15;
    if(to==='攝氏(°C)')result=c;
    else if(to==='華氏(°F)')result=c*9/5+32;
    else result=c+273.15;
  }else{
    var base=v*units[cat][from];
    result=base/units[cat][to];
  }
  var fmt=Math.abs(result)>=0.001&&Math.abs(result)<1e12?+result.toPrecision(8):result.toExponential(4);
  document.getElementById('rLabel').textContent=v+' '+from+' =';
  document.getElementById('rValue').textContent=fmt+' '+to;
  document.getElementById('result').style.display='block';
}
updateUnits();
</script>
