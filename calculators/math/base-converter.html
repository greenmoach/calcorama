<div class="card">
<h1>進位轉換計算機</h1>
<p class="subtitle">二 / 八 / 十 / 十六進位互轉</p>
<label for="inputVal">輸入數值</label>
<input type="text" id="inputVal" placeholder="例如：255">
<label for="fromBase">來源進位</label>
<select id="fromBase">
  <option value="10">十進位 (Decimal)</option>
  <option value="2">二進位 (Binary)</option>
  <option value="8">八進位 (Octal)</option>
  <option value="16">十六進位 (Hex)</option>
</select>
<button class="calc-btn" onclick="convert()">轉換</button>
<div class="result" id="result">
  <div class="result-row"><span class="result-label">二進位 (BIN)</span><span class="result-value" id="rBin"></span></div>
  <div class="result-row"><span class="result-label">八進位 (OCT)</span><span class="result-value" id="rOct"></span></div>
  <div class="result-row"><span class="result-label">十進位 (DEC)</span><span class="result-value" id="rDec"></span></div>
  <div class="result-row"><span class="result-label">十六進位 (HEX)</span><span class="result-value" id="rHex"></span></div>
</div>
</div>
<script>
function convert(){
  var val=document.getElementById('inputVal').value.trim().toUpperCase();
  var base=parseInt(document.getElementById('fromBase').value);
  if(!val){alert('請輸入數值');return;}
  var dec=parseInt(val,base);
  if(isNaN(dec)){alert('輸入格式錯誤，請確認數值與進位相符');return;}
  document.getElementById('rBin').textContent=dec.toString(2);
  document.getElementById('rOct').textContent=dec.toString(8);
  document.getElementById('rDec').textContent=dec.toString(10);
  document.getElementById('rHex').textContent=dec.toString(16).toUpperCase();
  document.getElementById('result').style.display='block';
}
document.getElementById('inputVal').addEventListener('keydown',function(e){if(e.key==='Enter')convert();});
</script>
