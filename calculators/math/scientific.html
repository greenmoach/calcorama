<button class="btn-fn" onclick="appendFn('sin(')">sin</button>

<script>
let expr='';let fresh=true;
const d=document.getElementById('display');
function append(v){if(fresh){expr='';fresh=false}expr+=v;d.textContent=expr}
function appendOp(o){fresh=false;expr+=o;d.textContent=expr}
function appendFn(f){if(fresh){expr='';fresh=false}expr+=f;d.textContent=expr}
function clearAll(){expr='';d.textContent='0';fresh=true}
function factorial(n){if(n<0)return NaN;if(n===0||n===1)return 1;let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function calculate(){
  try{
    let e=expr;
    e=e.replace(/sin\(([^)]+)\)/g,(_,a)=>Math.sin(parseFloat(a)*Math.PI/180));
    e=e.replace(/cos\(([^)]+)\)/g,(_,a)=>Math.cos(parseFloat(a)*Math.PI/180));
    e=e.replace(/tan\(([^)]+)\)/g,(_,a)=>Math.tan(parseFloat(a)*Math.PI/180));
    e=e.replace(/log\(([^)]+)\)/g,(_,a)=>Math.log10(parseFloat(a)));
    e=e.replace(/ln\(([^)]+)\)/g,(_,a)=>Math.log(parseFloat(a)));
    e=e.replace(/sqrt\(([^)]+)\)/g,(_,a)=>Math.sqrt(parseFloat(a)));
    e=e.replace(/pow\(([^)]+)\)/g,(_,a)=>{let p=a.split(',');return Math.pow(parseFloat(p[0]),parseFloat(p[1]))});
    e=e.replace(/fact\(([^)]+)\)/g,(_,a)=>factorial(parseInt(a)));
    let result=safeMath(e);
    d.textContent=result;expr=String(result);fresh=true;
  }catch(_){d.textContent='錯誤';expr='';fresh=true}
}
function safeMath(e){
  let tokens=[];let cur='';
  for(let i=0;i<e.length;i++){
    let c=e[i];
    if('+-*/()'.includes(c)){
      if(cur)tokens.push(cur);tokens.push(c);cur='';
    } else {cur+=c}
  }
  if(cur)tokens.push(cur);
  return parseExpr(tokens,{pos:0});
}
function parseExpr(t,s){
  let left=parseTerm(t,s);
  while(s.pos<t.length&&(t[s.pos]==='+'||t[s.pos]==='-')){
    let op=t[s.pos++];let right=parseTerm(t,s);
    left=op==='+'?left+right:left-right;
  }
  return left;
}
function parseTerm(t,s){
  let left=parseFactor(t,s);
  while(s.pos<t.length&&(t[s.pos]==='*'||t[s.pos]==='/')){
    let op=t[s.pos++];let right=parseFactor(t,s);
    left=op==='*'?left*right:left/right;
  }
  return left;
}
function parseFactor(t,s){
  if(t[s.pos]==='('){s.pos++;let v=parseExpr(t,s);s.pos++;return v}
  if(t[s.pos]==='-'){s.pos++;return -parseFactor(t,s)}
  return parseFloat(t[s.pos++]);
}
