*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#fbc2eb 0%,#e8a0d4 30%,#c9a0dc 60%,#a18cd1 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-radius:28px;box-shadow:0 8px 32px rgba(180,100,160,0.25);padding:36px 32px;max-width:460px;width:100%}
h1{text-align:center;color:#9b59b6;font-size:1.5rem;margin-bottom:16px}
.tabs{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
.tabs button{padding:10px 20px;border:2px solid #e0b0d0;border-radius:12px;background:#f8e1f0;color:#7b3f8a;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.tabs button.active{background:linear-gradient(135deg,#d4789c,#a18cd1);color:#fff;border-color:transparent}
.section{display:none}.section.active{display:block}
label{display:block;color:#7b3f8a;font-weight:600;margin:8px 0 4px;font-size:0.9rem}
input[type=number]{width:100%;padding:10px;border:2px solid #e0b0d0;border-radius:10px;font-size:1rem;font-family:'Nunito',sans-serif;outline:none;transition:border .2s}
input:focus{border-color:#d4789c}
.coeff-row{display:flex;gap:10px;align-items:center}
.coeff-row>div{flex:1}
.formula{text-align:center;color:#9b59b6;font-size:1rem;margin:12px 0;font-style:italic}
.solve-btn{display:block;margin:16px auto 0;padding:12px 40px;background:linear-gradient(135deg,#d4789c,#a18cd1);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
.solve-btn:hover{transform:scale(1.05);opacity:0.9}
.result{margin-top:16px;padding:16px;background:rgba(255,255,255,0.7);border-radius:16px;text-align:center;color:#6b3a7d;font-size:1.05rem;line-height:1.8}
.heart{position:fixed;color:#f5a0c0;opacity:0.3;animation:floatH 6s ease-in-out infinite;pointer-events:none;font-size:1.5rem}
@keyframes floatH{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px) rotate(15deg)}}
@media(max-width:480px){.card{padding:24px 16px}}
</style>

<body>
<a href="../../index.html" style="position:fixed;top:18px;left:18px;z-index:10;color:#d4789c;text-decoration:none;font-weight:700;font-size:0.95rem;">&#10094; 返回首頁</a>
<span class="heart" style="top:8%;left:4%">&#9829;</span>

<span class="heart" style="bottom:10%;left:6%;animation-delay:3s">&#9829;</span>
<div class="card">
<h1>&#128221; 方程式求解器</h1>
<div class="tabs">
  <button class="active" onclick="switchTab('linear')">一元一次</button>
  <button onclick="switchTab('quadratic')">一元二次</button>
</div>
<div id="linear" class="section active">
  <div class="formula">ax + b = 0</div>
  <div class="coeff-row">
    <div><label>a</label><input type="number" id="la" step="any"></div>
    <div><label>b</label><input type="number" id="lb" step="any"></div>
  </div>
  <button class="solve-btn" onclick="solveLinear()">求解</button>
  <div class="result" id="lr" style="display:none"></div>
</div>
<div id="quadratic" class="section">
  <div class="formula">ax&sup2; + bx + c = 0</div>
  <div class="coeff-row">
    <div><label>a</label><input type="number" id="qa" step="any"></div>
    <div><label>b</label><input type="number" id="qb" step="any"></div>
    <div><label>c</label><input type="number" id="qc" step="any"></div>
  </div>
  <button class="solve-btn" onclick="solveQuadratic()">求解</button>
  <div class="result" id="qr" style="display:none"></div>
</div>
</div>
<script>
function switchTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  event.target.classList.add('active');
}
function solveLinear(){
  let a=parseFloat(document.getElementById('la').value);
  let b=parseFloat(document.getElementById('lb').value);
  let r=document.getElementById('lr');r.style.display='block';
  if(isNaN(a)||a===0){r.innerHTML=isNaN(a)?'請輸入係數':'a 不可為 0';return}
  if(isNaN(b))b=0;
  let x=-b/a;
  r.innerHTML='<strong>解：x = '+x.toFixed(6).replace(/\.?0+$/,'')+'</strong>';
}
function solveQuadratic(){
  let a=parseFloat(document.getElementById('qa').value);
  let b=parseFloat(document.getElementById('qb').value)||0;
  let c=parseFloat(document.getElementById('qc').value)||0;
  let r=document.getElementById('qr');r.style.display='block';
  if(isNaN(a)||a===0){r.innerHTML='a 不可為 0';return}
  let D=b*b-4*a*c;
  let html='<strong>判別式 D = '+D.toFixed(4).replace(/\.?0+$/,'')+'</strong><br>';
  if(D>0){
    let x1=(-b+Math.sqrt(D))/(2*a);
    let x2=(-b-Math.sqrt(D))/(2*a);
    html+='兩相異實根<br>x₁ = '+x1.toFixed(6).replace(/\.?0+$/,'')+'<br>x₂ = '+x2.toFixed(6).replace(/\.?0+$/,'');
  }else if(D===0){
    let x=-b/(2*a);
    html+='重根<br>x = '+x.toFixed(6).replace(/\.?0+$/,'');
  }else{
    let real=(-b/(2*a)).toFixed(6).replace(/\.?0+$/,'');
    let imag=(Math.sqrt(-D)/(2*a)).toFixed(6).replace(/\.?0+$/,'');
    html+='兩共軛複數根<br>x₁ = '+real+' + '+imag+'i<br>x₂ = '+real+' - '+imag+'i';
  }
  r.innerHTML=html;
}
</script>
