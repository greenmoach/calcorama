<div class="card">
<h1>向量計算機</h1>
<p class="subtitle">加減、內積、外積、模長</p>
<div class="vec-group">
  <div class="vec-title">向量 A</div>
  <div class="vec-row">
    <div><input type="number" id="ax" placeholder="0" step="any"><div class="vec-label">x</div></div>
    <div><input type="number" id="ay" placeholder="0" step="any"><div class="vec-label">y</div></div>
    <div><input type="number" id="az" placeholder="0" step="any"><div class="vec-label">z</div></div>
  </div>
</div>
<div class="vec-group">
  <div class="vec-title">向量 B</div>
  <div class="vec-row">
    <div><input type="number" id="bx" placeholder="0" step="any"><div class="vec-label">x</div></div>
    <div><input type="number" id="by" placeholder="0" step="any"><div class="vec-label">y</div></div>
    <div><input type="number" id="bz" placeholder="0" step="any"><div class="vec-label">z</div></div>
  </div>
</div>
<label for="op">運算</label>
<select id="op">
  <option value="add">加法 A + B</option>
  <option value="sub">減法 A - B</option>
  <option value="dot">內積 A · B</option>
  <option value="cross">外積 A × B</option>
  <option value="mag">模長 |A| 和 |B|</option>
  <option value="angle">夾角</option>
</select>
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result"></div>
</div>
<script>
function g(id){return parseFloat(document.getElementById(id).value)||0;}
function fmt(n){return Math.round(n*10000)/10000;}
function mag(x,y,z){return Math.sqrt(x*x+y*y+z*z);}
function row(label,val){return '<div class="result-row"><span class="result-label">'+label+'</span><span class="result-value">'+val+'</span></div>';}
function vec(x,y,z){return '('+fmt(x)+', '+fmt(y)+', '+fmt(z)+')';}
function calculate(){
  var ax=g('ax'),ay=g('ay'),az=g('az');
  var bx=g('bx'),by=g('by'),bz=g('bz');
  var op=document.getElementById('op').value;
  var html='';
  if(op==='add'){html=row('A + B',vec(ax+bx,ay+by,az+bz));}
  else if(op==='sub'){html=row('A - B',vec(ax-bx,ay-by,az-bz));}
  else if(op==='dot'){html=row('A · B',fmt(ax*bx+ay*by+az*bz));}
  else if(op==='cross'){html=row('A × B',vec(ay*bz-az*by,az*bx-ax*bz,ax*by-ay*bx));}
  else if(op==='mag'){html=row('|A|',fmt(mag(ax,ay,az)))+row('|B|',fmt(mag(bx,by,bz)));}
  else if(op==='angle'){
    var ma=mag(ax,ay,az),mb=mag(bx,by,bz);
    if(ma===0||mb===0){html=row('錯誤','向量不可為零向量');}
    else{var dot=ax*bx+ay*by+az*bz;var cos=dot/(ma*mb);var angle=Math.acos(Math.min(1,Math.max(-1,cos)))*180/Math.PI;html=row('夾角',fmt(angle)+'°');}
  }
  document.getElementById('result').innerHTML=html;
  document.getElementById('result').style.display='block';
}
</script>
