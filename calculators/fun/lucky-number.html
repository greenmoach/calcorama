<h1>幸運數字計算機</h1>
<p class="subtitle">生日 → 命運數字（生命靈數）</p>
<label for="birthday">生日</label>
<input type="date" id="birthday">
<button class="calc-btn" onclick="calculate()">✨ 計算幸運數字</button>
<div class="result" id="result">
  <div class="life-path" id="rNum"></div>
  <div class="life-label">生命靈數</div>
  <div class="num-row" id="rLucky"></div>
  <div class="desc" id="rDesc"></div>
</div>
</div>
<script>
var meanings=[null,
  '領導者。具有強烈的獨立性與開創精神，天生的領導者，充滿自信與決斷力。',
  '合作者。擅長外交與合作，直覺靈敏，溫柔體貼，善於在幕後協調。',
  '溝通者。富有創造力與表達力，樂觀開朗，能帶給身邊的人歡樂與靈感。',
  '建設者。勤勞踏實，注重細節，有強烈的責任感，能建立穩固的基礎。',
  '冒險者。熱愛自由與變化，充滿活力，適應力強，渴望各種新體驗。',
  '養育者。溫暖、負責任，重視家庭與和諧，天生具有照顧他人的特質。',
  '智慧者。深思熟慮，追求真理，具有分析能力，喜歡獨處與內省。',
  '成就者。具有商業頭腦和執行力，追求物質成功，有強烈的目標導向。',
  '人道者。博愛慈悲，有宏觀視野，具有服務他人的使命感與同理心。',
  '大師數。具有特殊靈性使命，洞察力強，能激勵他人，也可視為 2 解讀。',
  '大師數。具有卓越的理想與遠見，有領袖魅力，也可視為 2 解讀。',
  '大師數。具有強烈的直覺與靈性，有實現夢想的能力，也可視為 3 解讀。'
];
var luckyNums={1:[1,10,19],2:[2,11,20],3:[3,12,21],4:[4,13,22],5:[5,14,23],6:[6,15,24],7:[7,16,25],8:[8,17,26],9:[9,18,27]};
function reduce(n){while(n>9&&n!==11&&n!==22&&n!==33)n=String(n).split('').reduce(function(a,b){return a+parseInt(b);},0);return n;}
function calculate(){
  var val=document.getElementById('birthday').value;
  if(!val){alert('請選擇生日');return;}
  var parts=val.replace(/-/g,'');
  var sum=parts.split('').reduce(function(a,b){return a+parseInt(b);},0);
  var lp=reduce(sum);
  var base=lp>9?reduce(lp):lp;
  var lucky=luckyNums[base]||[base,base+9,base+18];
  document.getElementById('rNum').textContent=lp;
  document.getElementById('rLucky').innerHTML=['幸運數字：'].concat(lucky).map(function(n,i){return i===0?'<span style="color:#e06898;font-size:.9rem;align-self:center">幸運數字：</span>':'<span class="num-chip">'+n+'</span>';}).join('');
  document.getElementById('rLucky').innerHTML='<span style="color:#e06898;font-size:.9rem;align-self:center;margin-right:4px">幸運數：</span>'+lucky.map(function(n){return '<span class="num-chip">'+n+'</span>';}).join('');
  document.getElementById('rDesc').textContent=meanings[lp]||meanings[reduce(lp)]||'充滿潛力的特殊組合。';
  document.getElementById('result').style.display='block';
}
</script>
