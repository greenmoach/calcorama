<script>
function hashNames(a, b) {
  var combined = (a + b).split('').sort().join('');
  var hash = 0;
  for (var i = 0; i < combined.length; i++) {
    var c = combined.charCodeAt(i);
    hash = ((hash << 5) - hash + c * 31 + i * 7) | 0;
  }
  hash = Math.abs(hash);
  return hash % 101;
}

function getDescription(score) {
  if (score >= 90) return '天作之合！你們簡直是命中注定的一對，彼此之間有著不可思議的默契與吸引力。珍惜這份緣分吧！';
  if (score >= 75) return '非常般配！你們之間有著很強的化學反應，只要用心經營，一定能擁有美好的未來。';
  if (score >= 60) return '相當不錯！你們之間有著良好的基礎，多一點包容和理解，感情會越來越甜蜜。';
  if (score >= 40) return '還算可以！雖然會有些小摩擦，但只要願意溝通和付出，也能發展出美好的關係。';
  if (score >= 20) return '需要努力！你們之間可能有些差異，但愛情的力量是偉大的，多花點心思在彼此身上吧。';
  return '挑戰重重！也許你們的個性差異較大，但別灰心，世界上沒有不可能的事情，真愛需要勇氣！';
}

function spawnHearts() {
  var container = document.getElementById('hearts');
  container.innerHTML = '';
  for (var i = 0; i < 15; i++) {
    var h = document.createElement('span');
    h.className = 'heart';
    h.textContent = ['❤️','💕','💖','💗','💘'][Math.floor(Math.random()*5)];
    h.style.left = (Math.random() * 100) + '%';
    h.style.bottom = '0';
    h.style.animationDelay = (Math.random() * 2) + 's';
    h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    container.appendChild(h);
  }
}

function animateScore(target) {
  var el = document.getElementById('scoreNum');
  var current = 0;
  var step = Math.max(1, Math.floor(target / 40));
  var timer = setInterval(function() {
    current += step;
    if (current >= target) {
      current = target;
      clearInterval(timer);
    }
    el.textContent = current;
  }, 30);
}

function calculate() {
  var n1 = document.getElementById('name1').value.trim();
  var n2 = document.getElementById('name2').value.trim();
  if (!n1 || !n2) { alert('請輸入兩個名字！'); return; }
  var score = hashNames(n1, n2);
  var resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('desc').textContent = getDescription(score);
  spawnHearts();
  animateScore(score);
}
</script>
