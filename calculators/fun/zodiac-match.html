.floating:nth-child(1){width:120px;height:120px;background:#ff9fd0;top:10%;left:5%;animation-delay:0s}

@keyframes floatAnim{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(200,80,140,.18);padding:40px 36px;max-width:480px;width:100%;position:relative;z-index:2}

.calc-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,80,140,.35)}

<body>
<a href="../../index.html" style="position:fixed;top:18px;left:18px;z-index:10;color:#fd79a8;text-decoration:none;font-weight:700;font-size:0.95rem;">&#10094; 返回首頁</a>
<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>星座配對計算機</h1>
<p class="subtitle">兩星座 → 配對分析</p>
<label for="z1">星座 A</label>
<select id="z1"></select>
<label for="z2">星座 B</label>
<select id="z2"></select>
<button class="calc-btn" onclick="calculate()">💕 計算配對</button>
<div class="result" id="result">
  <div class="pair" id="rPair"></div>
  <div class="score-val" id="rScore"></div>
  <div class="score-label">配對指數</div>
  <div class="score-bar"><div class="score-fill" id="rBar"></div></div>
  <div class="match-desc" id="rDesc"></div>
</div>
</div>
<script>
var zodiacs=[
  {name:'牡羊座',icon:'♈',el:'火',mod:'基本'},
  {name:'金牛座',icon:'♉',el:'土',mod:'固定'},
  {name:'雙子座',icon:'♊',el:'風',mod:'變動'},
  {name:'巨蟹座',icon:'♋',el:'水',mod:'基本'},
  {name:'獅子座',icon:'♌',el:'火',mod:'固定'},
  {name:'處女座',icon:'♍',el:'土',mod:'變動'},
  {name:'天秤座',icon:'♎',el:'風',mod:'基本'},
  {name:'天蠍座',icon:'♏',el:'水',mod:'固定'},
  {name:'射手座',icon:'♐',el:'火',mod:'變動'},
  {name:'摩羯座',icon:'♑',el:'土',mod:'基本'},
  {name:'水瓶座',icon:'♒',el:'風',mod:'固定'},
  {name:'雙魚座',icon:'♓',el:'水',mod:'變動'}
];
var opts=zodiacs.map(function(z,i){return '<option value="'+i+'">'+z.icon+' '+z.name+'</option>';}).join('');
document.getElementById('z1').innerHTML=opts;
document.getElementById('z2').innerHTML=opts;
document.getElementById('z2').selectedIndex=3;
var matchDescs={
  same:'同星座配對，彼此理解深刻，有強烈共鳴。但需注意相同的缺點可能放大，要互相包容成長。',
  trineEl:'同元素三分相，天生就能理解彼此，相處自然和諧，是靈魂伴侶般的存在。',
  sext:'六分相，有良好的溝通基礎，互相欣賞，友誼與愛情都能發展良好。',
  opp:'對分相，個性截然不同，但「異性相吸」，互相補足對方的不足，若能包容則非常互補。',
  sq:'四分相，個性衝突明顯，需要更多溝通與磨合，但衝突也能帶來成長的動力。',
  inc:'五分相或二分相，需要更多努力才能找到共同點，關係需要雙方主動經營。'
};
function getScore(i1,i2){
  if(i1===i2)return{score:85,type:'same'};
  var diff=Math.abs(i1-i2);if(diff>6)diff=12-diff;
  var e1=zodiacs[i1].el,e2=zodiacs[i2].el;
  var compatible={火:['風'],土:['水'],風:['火'],水:['土']};
  var same=e1===e2;
  var comp=compatible[e1]&&compatible[e1].indexOf(e2)>=0;
  if(diff===4||diff===8)return{score:same?95:88,type:'trineEl'};
  if(diff===2||diff===10)return{score:comp?80:72,type:'sext'};
  if(diff===6)return{score:75,type:'opp'};
  if(diff===3||diff===9)return{score:comp?65:58,type:'sq'};
  return{score:50,type:'inc'};
}
function calculate(){
  var i1=parseInt(document.getElementById('z1').value);
  var i2=parseInt(document.getElementById('z2').value);
  var z1=zodiacs[i1],z2=zodiacs[i2];
  var r=getScore(i1,i2);
  document.getElementById('rPair').textContent=z1.icon+' '+z1.name+' × '+z2.icon+' '+z2.name;
  document.getElementById('rScore').textContent=r.score+'%';
  document.getElementById('rBar').style.width=r.score+'%';
  document.getElementById('rDesc').textContent=matchDescs[r.type];
  document.getElementById('result').style.display='block';
}
</script>
