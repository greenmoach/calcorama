.card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(200,80,140,.18);padding:40px 36px;max-width:480px;width:100%;position:relative;z-index:2}

textarea{width:100%;padding:12px 16px;border:2px solid #ffc0e0;border-radius:14px;font-size:1rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .3s;background:#fff5fa;color:#c0286e;margin-bottom:18px;resize:vertical;min-height:100px}

input:focus{border-color:#fd79a8}

.calc-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,80,140,.35)}

<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>抽籤計算機</h1>
<p class="subtitle">輸入名單，隨機抽出幸運者</p>
<label for="names">參與名單（每行一個名字）</label>
<textarea id="names" placeholder="小明&#10;小華&#10;小美&#10;小強&#10;小玲"></textarea>
<label for="drawCount">抽出人數</label>
<input type="number" id="drawCount" value="1" min="1" step="1">
<button class="calc-btn" onclick="draw()">🎉 開始抽籤</button>
<div class="result" id="result">
  <div class="winner-title" id="rTitle"></div>
  <div id="rWinners"></div>
  <div class="pool-count" id="rPool"></div>
</div>
</div>
<script>
function draw(){
  var text=document.getElementById('names').value.trim();
  var count=parseInt(document.getElementById('drawCount').value)||1;
  if(!text){alert('請輸入參與名單');return;}
  var names=text.split('\n').map(function(n){return n.trim();}).filter(function(n){return n!=='';});
  if(names.length===0){alert('名單不能為空');return;}
  if(count>names.length){alert('抽出人數不能超過名單人數（'+names.length+'人）');return;}
  var pool=names.slice();
  var winners=[];
  for(var i=0;i<count;i++){
    var idx=Math.floor(Math.random()*pool.length);
    winners.push(pool.splice(idx,1)[0]);
  }
  document.getElementById('rTitle').textContent='🎊 中籤者（'+count+'人）';
  document.getElementById('rWinners').innerHTML=winners.map(function(w,i){return '<div class="winner-item" style="animation-delay:'+(i*0.1)+'s">🏆 第'+(i+1)+'名：'+w+'</div>';}).join('');
  document.getElementById('rPool').textContent='共 '+names.length+' 人參與';
  document.getElementById('result').style.display='block';
}
</script>
