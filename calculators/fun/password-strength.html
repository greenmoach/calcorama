@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.12);padding:48px 40px;max-width:500px;width:100%;text-align:center;position:relative;}

.subtitle{color:#636e72;font-size:0.95rem;margin-bottom:28px;}
.pw-wrap{position:relative;margin-bottom:20px;}
.pw-wrap input{width:100%;padding:14px 50px 14px 18px;border:2px solid #dfe6e9;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border-color 0.3s;}
.pw-wrap input:focus{border-color:#0984e3;}

.criteria-item .icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#fff;flex-shrink:0;transition:background 0.3s;}

<div class="card">
<h1>密碼強度計算機</h1>
<p class="subtitle">即時分析你的密碼有多安全</p>
<div class="pw-wrap">
<input type="password" id="pwInput" placeholder="請輸入密碼" oninput="analyze()">
<button class="toggle-vis" onclick="toggleVis()" id="toggleBtn">👁</button>
</div>
<div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
<div class="strength-label" id="strengthLabel"></div>
<div class="score-display" id="scoreDisplay">0</div>
<div class="crack-time" id="crackTime">請輸入密碼開始分析</div>
<div class="criteria" id="criteria">
<div class="criteria-item"><span class="icon fail" id="c-len">✗</span><span>至少 8 個字元</span></div>
<div class="criteria-item"><span class="icon fail" id="c-upper">✗</span><span>包含大寫字母 (A-Z)</span></div>
<div class="criteria-item"><span class="icon fail" id="c-lower">✗</span><span>包含小寫字母 (a-z)</span></div>
<div class="criteria-item"><span class="icon fail" id="c-num">✗</span><span>包含數字 (0-9)</span></div>
<div class="criteria-item"><span class="icon fail" id="c-special">✗</span><span>包含特殊字元 (!@#$...)</span></div>
</div>
</div>
<script>
function toggleVis() {
  var inp = document.getElementById('pwInput');
  var btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function setCriteria(id, pass) {
  var el = document.getElementById(id);
  el.className = 'icon ' + (pass ? 'pass' : 'fail');
  el.textContent = pass ? '✓' : '✗';
}

function estimateCrackTime(pw) {
  var poolSize = 0;
  if (/[a-z]/.test(pw)) poolSize += 26;
  if (/[A-Z]/.test(pw)) poolSize += 26;
  if (/[0-9]/.test(pw)) poolSize += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) poolSize += 33;
  if (poolSize === 0) return '—';
  var combinations = Math.pow(poolSize, pw.length);
  var guessesPerSec = 1e10;
  var seconds = combinations / guessesPerSec / 2;
  if (seconds < 1) return '不到一秒';
  if (seconds < 60) return '約 ' + Math.ceil(seconds) + ' 秒';
  if (seconds < 3600) return '約 ' + Math.ceil(seconds / 60) + ' 分鐘';
  if (seconds < 86400) return '約 ' + Math.ceil(seconds / 3600) + ' 小時';
  if (seconds < 86400 * 365) return '約 ' + Math.ceil(seconds / 86400) + ' 天';
  if (seconds < 86400 * 365 * 1000) return '約 ' + Math.ceil(seconds / (86400 * 365)) + ' 年';
  if (seconds < 86400 * 365 * 1e6) return '約 ' + Math.ceil(seconds / (86400 * 365 * 1000)) + ' 千年';
  if (seconds < 86400 * 365 * 1e9) return '約 ' + Math.ceil(seconds / (86400 * 365 * 1e6)) + ' 百萬年';
  return '幾乎不可能破解';
}

function analyze() {
  var pw = document.getElementById('pwInput').value;
  var hasLen = pw.length >= 8;
  var hasUpper = /[A-Z]/.test(pw);
  var hasLower = /[a-z]/.test(pw);
  var hasNum = /[0-9]/.test(pw);
  var hasSpecial = /[^a-zA-Z0-9]/.test(pw);
  setCriteria('c-len', hasLen);
  setCriteria('c-upper', hasUpper);
  setCriteria('c-lower', hasLower);
  setCriteria('c-num', hasNum);
  setCriteria('c-special', hasSpecial);

  var score = 0;
  if (pw.length === 0) { score = 0; }
  else {
    var critCount = (hasLen ? 1 : 0) + (hasUpper ? 1 : 0) + (hasLower ? 1 : 0) + (hasNum ? 1 : 0) + (hasSpecial ? 1 : 0);
    score = critCount * 15;
    if (pw.length >= 12) score += 10;
    if (pw.length >= 16) score += 10;
    if (pw.length >= 4 && pw.length < 8) score += 5;
    if (score > 100) score = 100;
    if (pw.length < 4) score = Math.min(score, 10);
  }

  var labels = ['', '很弱', '弱', '中等', '強', '很強'];
  var colors = ['#dfe6e9', '#d63031', '#e17055', '#fdcb6e', '#00b894', '#0984e3'];
  var idx = 0;
  if (score > 0) idx = 1;
  if (score >= 25) idx = 2;
  if (score >= 50) idx = 3;
  if (score >= 75) idx = 4;
  if (score >= 90) idx = 5;

  var fill = document.getElementById('meterFill');
  fill.style.width = score + '%';
  fill.style.background = colors[idx];
  document.getElementById('strengthLabel').textContent = labels[idx];
  document.getElementById('strengthLabel').style.color = colors[idx];
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('scoreDisplay').style.color = colors[idx];
  document.getElementById('crackTime').textContent = pw.length > 0 ? '預估破解時間：' + estimateCrackTime(pw) : '請輸入密碼開始分析';
}
</script>
