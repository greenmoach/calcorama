<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#fd79a8 0%,#fdcb6e 25%,#55efc4 50%,#74b9ff 75%,#a29bfe 100%);background-size:400% 400%;animation:gradientShift 12s ease infinite;display:flex;align-items:center;justify-content:center;padding:20px;}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.12);padding:48px 40px;max-width:540px;width:100%;text-align:center;position:relative;}
.card h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#6c5ce7,#74b9ff,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.subtitle{color:#636e72;font-size:0.95rem;margin-bottom:24px;}
.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{flex:1;padding:10px;border:2px solid #dfe6e9;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;color:#636e72;cursor:pointer;transition:all 0.3s;}
.tab.active{border-color:#6c5ce7;color:#6c5ce7;background:rgba(108,92,231,0.08);}
.panel{display:none;}
.panel.active{display:block;}
label{display:block;text-align:left;font-weight:700;color:#636e72;margin-bottom:6px;font-size:0.9rem;}
input[type="number"],select{width:100%;padding:12px 16px;border:2px solid #dfe6e9;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border-color 0.3s;margin-bottom:14px;}
input[type="number"]:focus,select:focus{border-color:#6c5ce7;}
.row{display:flex;gap:12px;}
.row>div{flex:1;}
.btn{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border:none;padding:14px 36px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 6px 20px rgba(108,92,231,0.3);width:100%;margin-top:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,92,231,0.4);}
.btn:active{transform:translateY(0);}
.results{margin-top:24px;display:none;}
.results-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px;}
.result-item{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;padding:10px 20px;border-radius:12px;font-size:1.15rem;font-weight:700;animation:popIn 0.4s ease backwards;box-shadow:0 4px 12px rgba(108,92,231,0.25);}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.dice-area{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
.die{width:64px;height:64px;background:#fff;border:3px solid #6c5ce7;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#6c5ce7;animation:popIn 0.4s ease backwards;box-shadow:0 4px 12px rgba(108,92,231,0.15);}
.die.rolling{animation:diceRoll 0.5s ease;}
@keyframes diceRoll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(1.1)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
.float-deco{position:fixed;border-radius:50%;opacity:0.15;pointer-events:none;}
.float-deco:nth-child(1){width:200px;height:200px;background:#6c5ce7;top:-60px;right:-60px;animation:floatDeco 8s ease-in-out infinite;}
.float-deco:nth-child(2){width:150px;height:150px;background:#55efc4;bottom:-40px;left:-40px;animation:floatDeco 10s ease-in-out infinite reverse;}
.float-deco:nth-child(3){width:100px;height:100px;background:#fdcb6e;top:50%;right:-20px;animation:floatDeco 7s ease-in-out infinite 2s;}
@keyframes floatDeco{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
@media(max-width:520px){.card{padding:32px 20px;margin:10px;}.card h1{font-size:1.5rem;}.row{flex-direction:column;gap:0;}}

<div class="card">
<h1>隨機數產生器</h1>
<p class="subtitle">產生隨機數字或擲骰子，讓命運來決定吧！</p>
<div class="tabs">
<button class="tab active" onclick="switchTab('number')">隨機數字</button>
<button class="tab" onclick="switchTab('dice')">擲骰子</button>
</div>
<div class="panel active" id="panel-number">
<div class="row">
<div><label for="minVal">最小值</label><input type="number" id="minVal" value="1"></div>
<div><label for="maxVal">最大值</label><input type="number" id="maxVal" value="100"></div>
</div>
<div class="row">
<div><label for="numType">類型</label>
<select id="numType"><option value="integer">整數</option><option value="decimal">小數</option></select></div>
<div><label for="quantity">數量</label><input type="number" id="quantity" value="1" min="1" max="100"></div>
</div>
<button class="btn" onclick="generateNumbers()">產生隨機數</button>
<div class="results" id="numResults">
<div class="results-grid" id="numGrid"></div>
</div>
</div>
<div class="panel" id="panel-dice">
<label for="diceCount">骰子數量</label>
<input type="number" id="diceCount" value="1" min="1" max="10">
<button class="btn" onclick="rollDice()">擲骰子！</button>
<div class="dice-area" id="diceArea"></div>
<div class="results" id="diceTotal" style="margin-top:16px;font-size:1.1rem;font-weight:700;color:#6c5ce7;"></div>
</div>
</div>
<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (name === 'number' && i === 0) || (name === 'dice' && i === 1));
  });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
}

function generateNumbers() {
  var min = parseFloat(document.getElementById('minVal').value);
  var max = parseFloat(document.getElementById('maxVal').value);
  var type = document.getElementById('numType').value;
  var qty = parseInt(document.getElementById('quantity').value, 10);
  if (isNaN(min) || isNaN(max) || isNaN(qty)) { alert('請輸入有效數字！'); return; }
  if (min > max) { var tmp = min; min = max; max = tmp; }
  if (qty < 1) qty = 1;
  if (qty > 100) qty = 100;
  var results = [];
  for (var i = 0; i < qty; i++) {
    var r = Math.random() * (max - min) + min;
    if (type === 'integer') r = Math.floor(r) + (Math.random() < ((max - Math.floor(r)) / (max - min + 1)) ? 0 : 0);
    if (type === 'integer') { r = Math.floor(Math.random() * (Math.floor(max) - Math.ceil(min) + 1)) + Math.ceil(min); }
    else { r = parseFloat((Math.random() * (max - min) + min).toFixed(4)); }
    results.push(r);
  }
  var grid = document.getElementById('numGrid');
  grid.innerHTML = '';
  results.forEach(function(v, idx) {
    var el = document.createElement('span');
    el.className = 'result-item';
    el.textContent = v;
    el.style.animationDelay = (idx * 0.08) + 's';
    grid.appendChild(el);
  });
  document.getElementById('numResults').style.display = 'block';
}

function rollDice() {
  var count = parseInt(document.getElementById('diceCount').value, 10);
  if (isNaN(count) || count < 1) count = 1;
  if (count > 10) count = 10;
  var area = document.getElementById('diceArea');
  area.innerHTML = '';
  var faces = ['', '\u2680', '\u2681', '\u2682', '\u2683', '\u2684', '\u2685'];
  var total = 0;
  for (var i = 0; i < count; i++) {
    var val = Math.floor(Math.random() * 6) + 1;
    total += val;
    var die = document.createElement('div');
    die.className = 'die rolling';
    die.textContent = faces[val];
    die.style.animationDelay = (i * 0.1) + 's';
    area.appendChild(die);
  }
  var totalEl = document.getElementById('diceTotal');
  totalEl.style.display = 'block';
  totalEl.textContent = '總計：' + total;
}
</script>
