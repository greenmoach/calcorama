<div class="card">
<h1>畢氏定理計算機</h1>
<p class="subtitle">直角三角形三邊計算</p>
<div class="formula">a² + b² = c²</div>
<p class="hint" style="margin-bottom:16px;margin-top:-8px">留空一個欄位，系統自動求解</p>
<label for="a">直角邊 a</label>
<input type="number" id="a" placeholder="留空則計算此邊" min="0" step="any">
<label for="b">直角邊 b</label>
<input type="number" id="b" placeholder="留空則計算此邊" min="0" step="any">
<label for="c">斜邊 c（最長邊）</label>
<input type="number" id="c" placeholder="留空則計算此邊" min="0" step="any">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="result-row"><span class="result-label">直角邊 a</span><span class="result-value" id="rA"></span></div>
  <div class="result-row"><span class="result-label">直角邊 b</span><span class="result-value" id="rB"></span></div>
  <div class="result-row"><span class="result-label">斜邊 c</span><span class="result-value" id="rC"></span></div>
  <div class="result-row"><span class="result-label">面積</span><span class="result-value" id="rArea"></span></div>
  <div class="result-row"><span class="result-label">周長</span><span class="result-value" id="rPerim"></span></div>
</div>
</div>
<script>
function fmt(n){return Math.round(n*10000)/10000;}
function calculate(){
  var av=document.getElementById('a').value;
  var bv=document.getElementById('b').value;
  var cv=document.getElementById('c').value;
  var a=av===''?null:parseFloat(av);
  var b=bv===''?null:parseFloat(bv);
  var c=cv===''?null:parseFloat(cv);
  var filled=[a,b,c].filter(function(v){return v!==null;});
  if(filled.length!==2){alert('請填入任意兩個已知邊長（留空一個）');return;}
  if(filled.some(function(v){return v<=0;})){alert('邊長必須大於零');return;}
  var ra,rb,rc;
  if(c===null){ra=a;rb=b;rc=Math.sqrt(a*a+b*b);}
  else if(a===null){rb=b;rc=c;if(c<=b){alert('斜邊必須大於直角邊');return;}ra=Math.sqrt(c*c-b*b);}
  else{ra=a;rc=c;if(c<=a){alert('斜邊必須大於直角邊');return;}rb=Math.sqrt(c*c-a*a);}
  document.getElementById('rA').textContent=fmt(ra);
  document.getElementById('rB').textContent=fmt(rb);
  document.getElementById('rC').textContent=fmt(rc);
  document.getElementById('rArea').textContent=fmt(ra*rb/2);
  document.getElementById('rPerim').textContent=fmt(ra+rb+rc);
  document.getElementById('result').style.display='block';
}
</script>
