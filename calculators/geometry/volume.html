<div class="card">
<h1>體積計算機</h1>
<p class="subtitle">球體 / 圓柱 / 圓錐 / 長方體 / 正方體</p>
<label for="shape">選擇形狀</label>
<select id="shape" onchange="updateFields()">
  <option value="sphere">球體</option>
  <option value="cylinder">圓柱體</option>
  <option value="cone">圓錐體</option>
  <option value="cube">正方體</option>
  <option value="box">長方體</option>
</select>
<div id="fSphere" class="fields active">
  <label>半徑 r</label>
  <input type="number" id="sphereR" placeholder="例如：5" min="0" step="any">
</div>
<div id="fCylinder" class="fields">
  <label>底面半徑 r</label>
  <input type="number" id="cylR" placeholder="例如：5" min="0" step="any">
  <label>高度 h</label>
  <input type="number" id="cylH" placeholder="例如：10" min="0" step="any">
</div>
<div id="fCone" class="fields">
  <label>底面半徑 r</label>
  <input type="number" id="coneR" placeholder="例如：5" min="0" step="any">
  <label>高度 h</label>
  <input type="number" id="coneH" placeholder="例如：10" min="0" step="any">
</div>
<div id="fCube" class="fields">
  <label>邊長 a</label>
  <input type="number" id="cubeA" placeholder="例如：5" min="0" step="any">
</div>
<div id="fBox" class="fields">
  <label>長 l</label>
  <input type="number" id="boxL" placeholder="例如：10" min="0" step="any">
  <label>寬 w</label>
  <input type="number" id="boxW" placeholder="例如：5" min="0" step="any">
  <label>高 h</label>
  <input type="number" id="boxH" placeholder="例如：8" min="0" step="any">
</div>
<button class="calc-btn" onclick="calculate()">計算體積</button>
<div class="result" id="result">
  <div class="highlight" id="rVol"></div>
  <div class="result-row"><span class="result-label">表面積</span><span class="result-value" id="rSA"></span></div>
</div>
</div>
<script>
function g(id){return parseFloat(document.getElementById(id).value);}
function fmt(n){return Math.round(n*1000)/1000;}
function updateFields(){
  var s=document.getElementById('shape').value;
  var map={sphere:'fSphere',cylinder:'fCylinder',cone:'fCone',cube:'fCube',box:'fBox'};
  Object.values(map).forEach(function(id){document.getElementById(id).classList.remove('active');});
  document.getElementById(map[s]).classList.add('active');
  document.getElementById('result').style.display='none';
}
function calculate(){
  var s=document.getElementById('shape').value;
  var vol,sa;
  if(s==='sphere'){var r=g('sphereR');if(!r||r<=0){alert('請輸入半徑');return;}vol=4/3*Math.PI*r*r*r;sa=4*Math.PI*r*r;}
  else if(s==='cylinder'){var r=g('cylR'),h=g('cylH');if(!r||!h||r<=0||h<=0){alert('請輸入半徑與高度');return;}vol=Math.PI*r*r*h;sa=2*Math.PI*r*(r+h);}
  else if(s==='cone'){var r=g('coneR'),h=g('coneH');if(!r||!h||r<=0||h<=0){alert('請輸入半徑與高度');return;}var sl=Math.sqrt(r*r+h*h);vol=1/3*Math.PI*r*r*h;sa=Math.PI*r*(r+sl);}
  else if(s==='cube'){var a=g('cubeA');if(!a||a<=0){alert('請輸入邊長');return;}vol=a*a*a;sa=6*a*a;}
  else{var l=g('boxL'),w=g('boxW'),h=g('boxH');if(!l||!w||!h||l<=0||w<=0||h<=0){alert('請輸入長寬高');return;}vol=l*w*h;sa=2*(l*w+l*h+w*h);}
  document.getElementById('rVol').textContent='體積：'+fmt(vol);
  document.getElementById('rSA').textContent=fmt(sa);
  document.getElementById('result').style.display='block';
}
</script>
