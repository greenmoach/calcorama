<div class="floating f1"></div><div class="floating f2"></div><div class="floating f3"></div><div class="floating f4"></div>
<div class="card">
  <h1>多邊形面積計算機</h1>
  <p class="subtitle">計算正多邊形的面積與角度</p>
  <div class="input-group">
    <label>邊數 (3-12)</label>
    <select id="sides" onchange="updateName()">
      <option value="3">3 - 三角形</option>
      <option value="4">4 - 正方形</option>
      <option value="5">5 - 五邊形</option>
      <option value="6" selected>6 - 六邊形</option>
      <option value="7">7 - 七邊形</option>
      <option value="8">8 - 八邊形</option>
      <option value="9">9 - 九邊形</option>
      <option value="10">10 - 十邊形</option>
      <option value="11">11 - 十一邊形</option>
      <option value="12">12 - 十二邊形</option>
    </select>
  </div>
  <div class="input-group">
    <label>邊長</label>
    <input type="number" id="sideLen" min="0" step="any" placeholder="請輸入邊長">
  </div>
  <button class="btn" onclick="calc()">計算</button>
  <div class="error" id="error"></div>
  <div class="result" id="result"></div>
</div>
<script>
var polyNames={3:'正三角形',4:'正方形',5:'正五邊形',6:'正六邊形',7:'正七邊形',8:'正八邊形',9:'正九邊形',10:'正十邊形',11:'正十一邊形',12:'正十二邊形'};
function updateName(){}
function showError(msg){var e=document.getElementById('error');e.textContent=msg;e.style.display='block';document.getElementById('result').style.display='none';}
function fmt(n){return parseFloat(n.toFixed(6)).toString();}
function drawPolygon(n){
  var cx=100,cy=100,r=80;
  var points=[];
  for(var i=0;i<n;i++){
    var angle=(2*Math.PI*i/n)-(Math.PI/2);
    points.push((cx+r*Math.cos(angle)).toFixed(1)+','+(cy+r*Math.sin(angle)).toFixed(1));
  }
  return '<svg class="polygon-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">'+
    '<polygon points="'+points.join(' ')+'" fill="rgba(85,239,196,0.18)" stroke="#00b894" stroke-width="2.5" stroke-linejoin="round"/>'+
    '</svg>';
}
function calc(){
  var n=parseInt(document.getElementById('sides').value);
  var s=parseFloat(document.getElementById('sideLen').value);
  if(isNaN(s)||s<=0){showError('請輸入有效的正數邊長');return;}
  var area=(n*s*s)/(4*Math.tan(Math.PI/n));
  var perimeter=n*s;
  var interiorAngle=((n-2)*180)/n;
  var exteriorAngle=360/n;
  var name=polyNames[n]||('正'+n+'邊形');
  var html='<h3>'+name+' 計算結果</h3>'+
    '<div class="result-row"><span class="result-label">邊數</span><span class="result-value">'+n+'</span></div>'+
    '<div class="result-row"><span class="result-label">邊長</span><span class="result-value">'+fmt(s)+'</span></div>'+
    '<div class="result-row"><span class="result-label">面積</span><span class="result-value">'+fmt(area)+'</span></div>'+
    '<div class="result-row"><span class="result-label">周長</span><span class="result-value">'+fmt(perimeter)+'</span></div>'+
    '<div class="result-row"><span class="result-label">內角</span><span class="result-value">'+fmt(interiorAngle)+'°</span></div>'+
    '<div class="result-row"><span class="result-label">外角</span><span class="result-value">'+fmt(exteriorAngle)+'°</span></div>'+
    '<div class="polygon-visual">'+drawPolygon(n)+'</div>';
  var r2=document.getElementById('result');r2.innerHTML=html;r2.style.display='block';
  document.getElementById('error').style.display='none';
}
</script>
