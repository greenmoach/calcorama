<div class="card">
<h1>生肖計算機</h1>
<p class="subtitle">出生年 → 生肖 ＋ 性格特質</p>
<label for="year">出生年份</label>
<input type="number" id="year" placeholder="例如：1990" min="1900" max="2100" step="1">
<button class="calc-btn" onclick="calculate()">查詢生肖</button>
<div class="result" id="result">
  <div class="animal-icon" id="rIcon"></div>
  <div class="animal-name" id="rName"></div>
  <div class="element" id="rElement"></div>
  <div class="year-info" id="rYearInfo"></div>
  <div class="trait" id="rTrait"></div>
</div>
</div>
<script>
var animals=[
  {name:'鼠',icon:'🐭',element:'水',trait:'聰明機智、記憶力強、適應力佳。善於分析，能在複雜環境中找到機會，人緣好。'},
  {name:'牛',icon:'🐂',element:'土',trait:'勤勞踏實、意志堅定、做事認真。性格穩重，值得信賴，一旦下定決心便堅持到底。'},
  {name:'虎',icon:'🐯',element:'木',trait:'勇敢自信、熱情奔放、天生領袖。行動力強，敢於挑戰，對不公平的事情會直接表達。'},
  {name:'兔',icon:'🐰',element:'木',trait:'溫柔體貼、心思細膩、善解人意。追求和平，重視家庭與友情，有藝術鑑賞力。'},
  {name:'龍',icon:'🐲',element:'土',trait:'充滿魅力、自信十足、具有遠見。天生的領導者，做事大氣，對目標充滿熱情。'},
  {name:'蛇',icon:'🐍',element:'火',trait:'直覺敏銳、思維深邃、神秘優雅。善於思考，擁有強烈的第六感，處事謹慎智慧。'},
  {name:'馬',icon:'🐴',element:'火',trait:'活潑開朗、熱愛自由、精力充沛。喜歡探索新事物，行動力強，樂觀向上。'},
  {name:'羊',icon:'🐑',element:'土',trait:'溫和善良、富有同情心、藝術氣息濃厚。重視美感，心地善良，對他人需求敏感。'},
  {name:'猴',icon:'🐒',element:'金',trait:'機智靈活、好奇心強、創意無限。適應力強，學習能力佳，善於解決複雜問題。'},
  {name:'雞',icon:'🐓',element:'金',trait:'勤奮觀察、注重細節、直率坦誠。做事有條理，對自己和他人都有高標準。'},
  {name:'狗',icon:'🐕',element:'土',trait:'忠誠正直、責任感強、值得信賴。重視道義，對朋友和家人非常忠心，愛護公平。'},
  {name:'豬',icon:'🐷',element:'水',trait:'善良寬厚、真誠坦率、享受生活。性情溫和，對朋友大方，做事認真負責。'}
];
var stems=['庚','辛','壬','癸','甲','乙','丙','丁','戊','己'];
var elements=['金','金','水','水','木','木','火','火','土','土'];
function calculate(){
  var year=parseInt(document.getElementById('year').value);
  if(!year||year<1900||year>2100){alert('請輸入1900-2100之間的年份');return;}
  var idx=((year-4)%12+12)%12;
  var animal=animals[idx];
  var elemIdx=((year-0)%10+10)%10;
  var nextYear=year+12;
  document.getElementById('rIcon').textContent=animal.icon;
  document.getElementById('rName').textContent=year+'年 '+animal.name+'年';
  document.getElementById('rElement').textContent='天干：'+stems[elemIdx]+' ｜ 五行：'+elements[elemIdx];
  document.getElementById('rYearInfo').textContent='下一個'+animal.name+'年：'+nextYear+'年';
  document.getElementById('rTrait').textContent=animal.trait;
  document.getElementById('result').style.display='block';
}
</script>
