<div class="card">
  <h1>時區轉換計算機</h1>
  <p class="subtitle">快速轉換世界各地時間</p>
  <div class="row2">
    <div><label for="inputDate">日期</label><input type="date" id="inputDate"></div>
    <div><label for="inputTime">時間</label><input type="time" id="inputTime" value="12:00"></div>
  </div>
  <label for="fromTz">來源時區</label>
  <select id="fromTz">
    <option value="8">Asia/Taipei 台北 (UTC+8)</option>
    <option value="9">Asia/Tokyo 東京 (UTC+9)</option>
    <option value="8">Asia/Shanghai 上海 (UTC+8)</option>
    <option value="8">Asia/Hong_Kong 香港 (UTC+8)</option>
    <option value="9">Asia/Seoul 首爾 (UTC+9)</option>
    <option value="7">Asia/Bangkok 曼谷 (UTC+7)</option>
    <option value="5.5">Asia/Kolkata 加爾各答 (UTC+5:30)</option>
    <option value="0">Europe/London 倫敦 (UTC+0)</option>
    <option value="1">Europe/Paris 巴黎 (UTC+1)</option>
    <option value="1">Europe/Berlin 柏林 (UTC+1)</option>
    <option value="3">Europe/Moscow 莫斯科 (UTC+3)</option>
    <option value="-5">America/New_York 紐約 (UTC-5)</option>
    <option value="-6">America/Chicago 芝加哥 (UTC-6)</option>
    <option value="-7">America/Denver 丹佛 (UTC-7)</option>
    <option value="-8">America/Los_Angeles 洛杉磯 (UTC-8)</option>
    <option value="0">UTC 世界協調時間 (UTC+0)</option>
    <option value="10">Australia/Sydney 雪梨 (UTC+10)</option>
    <option value="12">Pacific/Auckland 奧克蘭 (UTC+12)</option>
  </select>
  <label for="toTz">目標時區</label>
  <select id="toTz">
    <option value="-5">America/New_York 紐約 (UTC-5)</option>
    <option value="-8">America/Los_Angeles 洛杉磯 (UTC-8)</option>
    <option value="-6">America/Chicago 芝加哥 (UTC-6)</option>
    <option value="-7">America/Denver 丹佛 (UTC-7)</option>
    <option value="0">Europe/London 倫敦 (UTC+0)</option>
    <option value="1">Europe/Paris 巴黎 (UTC+1)</option>
    <option value="1">Europe/Berlin 柏林 (UTC+1)</option>
    <option value="3">Europe/Moscow 莫斯科 (UTC+3)</option>
    <option value="8">Asia/Taipei 台北 (UTC+8)</option>
    <option value="9">Asia/Tokyo 東京 (UTC+9)</option>
    <option value="8">Asia/Shanghai 上海 (UTC+8)</option>
    <option value="8">Asia/Hong_Kong 香港 (UTC+8)</option>
    <option value="9">Asia/Seoul 首爾 (UTC+9)</option>
    <option value="7">Asia/Bangkok 曼谷 (UTC+7)</option>
    <option value="5.5">Asia/Kolkata 加爾各答 (UTC+5:30)</option>
    <option value="0">UTC 世界協調時間 (UTC+0)</option>
    <option value="10">Australia/Sydney 雪梨 (UTC+10)</option>
    <option value="12">Pacific/Auckland 奧克蘭 (UTC+12)</option>
  </select>
  <button onclick="convertTz()">轉換時區</button>
  <div class="error" id="error"></div>
  <div class="result" id="result">
    <h2>轉換結果</h2>
    <div class="result-time" id="resultTime"></div>
    <div class="result-date-info" id="resultDateInfo"></div>
    <div class="result-tz" id="resultTz"></div>
  </div>
</div>
<script>
(function() {
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth()+1).padStart(2,'0');
  var d = String(now.getDate()).padStart(2,'0');
  document.getElementById('inputDate').value = y+'-'+m+'-'+d;
})();
function convertTz() {
  var errEl = document.getElementById('error');
  var resultEl = document.getElementById('result');
  errEl.textContent = '';
  var dateVal = document.getElementById('inputDate').value;
  var timeVal = document.getElementById('inputTime').value;
  if (!dateVal || !timeVal) { errEl.textContent = '請輸入日期和時間'; return; }
  var fromOffset = parseFloat(document.getElementById('fromTz').value);
  var toOffset = parseFloat(document.getElementById('toTz').value);
  var fromLabel = document.getElementById('fromTz').options[document.getElementById('fromTz').selectedIndex].text;
  var toLabel = document.getElementById('toTz').options[document.getElementById('toTz').selectedIndex].text;

  var dp = dateVal.split('-');
  var tp = timeVal.split(':');
  var year = parseInt(dp[0],10), month = parseInt(dp[1],10)-1, day = parseInt(dp[2],10);
  var hour = parseInt(tp[0],10), minute = parseInt(tp[1],10);

  // Convert to UTC minutes then to target
  var totalMinutes = hour * 60 + minute;
  var utcMinutes = totalMinutes - (fromOffset * 60);
  var targetMinutes = utcMinutes + (toOffset * 60);

  // Handle day overflow
  var dayShift = 0;
  while (targetMinutes < 0) { targetMinutes += 1440; dayShift--; }
  while (targetMinutes >= 1440) { targetMinutes -= 1440; dayShift++; }

  var resultDate = new Date(year, month, day);
  resultDate.setDate(resultDate.getDate() + dayShift);

  var rHour = Math.floor(targetMinutes / 60);
  var rMin = Math.round(targetMinutes % 60);
  var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  document.getElementById('resultTime').textContent =
    String(rHour).padStart(2,'0') + ':' + String(rMin).padStart(2,'0');
  document.getElementById('resultDateInfo').textContent =
    resultDate.getFullYear() + '/' + (resultDate.getMonth()+1) + '/' + resultDate.getDate() + ' ' + weekdays[resultDate.getDay()];
  document.getElementById('resultTz').textContent = fromLabel + ' \u2192 ' + toLabel;

  var diffH = toOffset - fromOffset;
  var sign = diffH >= 0 ? '+' : '';
  document.getElementById('resultTz').textContent += ' (時差 ' + sign + diffH + ' 小時)';
  resultEl.style.display = 'block';
}
</script>
