<script>
var zodiacData=[
  {name:'摩羯座',icon:'♑',start:[1,1],end:[1,19],trait:'務實、自律、有責任感、雄心壯志。善於規劃長遠目標，做事有條不紊，值得信賴。'},
  {name:'水瓶座',icon:'♒',start:[1,20],end:[2,18],trait:'獨立、創新、人道主義。思維前衛，喜愛自由，擁有獨特的世界觀和社交圈。'},
  {name:'雙魚座',icon:'♓',start:[2,19],end:[3,20],trait:'富有同理心、想像力豐富、直覺敏銳。感情細膩，善解人意，富藝術氣息。'},
  {name:'牡羊座',icon:'♈',start:[3,21],end:[4,19],trait:'勇敢、熱情、充滿活力。天生領導者，行動力強，對新事物充滿好奇。'},
  {name:'金牛座',icon:'♉',start:[4,20],end:[5,20],trait:'穩定、耐心、享受生活。重視物質安全感，對美食、藝術有獨特品味。'},
  {name:'雙子座',icon:'♊',start:[5,21],end:[6,20],trait:'好奇心強、機智、善於溝通。思維靈活，能適應各種社交場合，充滿趣味。'},
  {name:'巨蟹座',icon:'♋',start:[6,21],end:[7,22],trait:'溫柔、體貼、重視家庭。情感豐富，對親近的人非常照顧，直覺力強。'},
  {name:'獅子座',icon:'♌',start:[7,23],end:[8,22],trait:'自信、慷慨、有魅力。天生的表演者，熱愛被關注，對自己和他人都很忠誠。'},
  {name:'處女座',icon:'♍',start:[8,23],end:[9,22],trait:'細心、分析力強、追求完美。注重細節，工作認真，對健康和衛生非常在意。'},
  {name:'天秤座',icon:'♎',start:[9,23],end:[10,22],trait:'追求和諧、公平、優雅迷人。善於社交，對美有敏銳感知，討厭衝突。'},
  {name:'天蠍座',icon:'♏',start:[10,23],end:[11,21],trait:'深刻、神秘、意志堅定。感情強烈，洞察力驚人，一旦下定決心便全力以赴。'},
  {name:'射手座',icon:'♐',start:[11,22],end:[12,21],trait:'樂觀、開朗、熱愛自由。喜愛探索和旅行，充滿哲學思維，視野廣闊。'},
  {name:'摩羯座',icon:'♑',start:[12,22],end:[12,31],trait:'務實、自律、有責任感、雄心壯志。善於規劃長遠目標，做事有條不紊，值得信賴。'}
];
function getZodiac(m,d){
  for(var i=0;i<zodiacData.length;i++){
    var z=zodiacData[i];
    var afterStart=m>z.start[0]||(m===z.start[0]&&d>=z.start[1]);
    var beforeEnd=m<z.end[0]||(m===z.end[0]&&d<=z.end[1]);
    if(afterStart&&beforeEnd)return z;
  }
  return zodiacData[0];
}
var dateRanges=['1/20-2/18','2/19-3/20','3/21-4/19','4/20-5/20','5/21-6/20','6/21-7/22','7/23-8/22','8/23-9/22','9/23-10/22','10/23-11/21','11/22-12/21','12/22-1/19'];
function calculate(){
  var val=document.getElementById('birthday').value;
  if(!val){alert('請選擇生日');return;}
  var d=new Date(val);
  var m=d.getMonth()+1,day=d.getDate();
  var z=getZodiac(m,day);
  document.getElementById('rIcon').textContent=z.icon;
  document.getElementById('rName').textContent=z.name;
  document.getElementById('rDate').textContent=z.start[0]+'/'+z.start[1]+' ~ '+z.end[0]+'/'+z.end[1];
  document.getElementById('rTrait').textContent=z.trait;
  document.getElementById('result').style.display='block';
}
