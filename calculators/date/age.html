<div class="card">
  <h1>年齡計算機</h1>
  <p class="subtitle">輸入生日，精確計算您的年齡</p>
  <label for="birthday">出生日期</label>
  <input type="date" id="birthday">
  <button onclick="calcAge()">計算年齡</button>
  <div class="error" id="error"></div>
  <div class="result" id="result">
    <h2>您的年齡</h2>
    <div class="age-big" id="ageBig"></div>
    <div class="info-row"><span class="info-label">精確年齡</span><span class="info-value" id="exact"></span></div>
    <div class="info-row"><span class="info-label">已活天數</span><span class="info-value" id="totalDays"></span></div>
    <div class="info-row"><span class="info-label">已活小時數</span><span class="info-value" id="totalHours"></span></div>
    <div class="info-row"><span class="info-label">下次生日</span><span class="info-value" id="nextBday"></span></div>
    <div class="info-row"><span class="info-label">距下次生日</span><span class="info-value" id="bdayCountdown"></span></div>
  </div>
</div>
<script>
function calcAge() {
  var errEl = document.getElementById('error');
  var resultEl = document.getElementById('result');
  errEl.textContent = '';
  var val = document.getElementById('birthday').value;
  if (!val) { errEl.textContent = '請選擇出生日期'; return; }
  var parts = val.split('-');
  var bYear = parseInt(parts[0],10), bMonth = parseInt(parts[1],10)-1, bDay = parseInt(parts[2],10);
  var birth = new Date(bYear, bMonth, bDay);
  var now = new Date();
  if (birth > now) { errEl.textContent = '出生日期不能在未來'; return; }

  var years = now.getFullYear() - birth.getFullYear();
  var months = now.getMonth() - birth.getMonth();
  var days = now.getDate() - birth.getDate();
  if (days < 0) {
    months--;
    var prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
  }
  if (months < 0) { years--; months += 12; }

  document.getElementById('ageBig').innerHTML = years + ' <span>歲</span>';
  document.getElementById('exact').textContent = years + ' 年 ' + months + ' 個月 ' + days + ' 天';

  var diffMs = now.getTime() - birth.getTime();
  var totalDays = Math.floor(diffMs / 86400000);
  var totalHours = Math.floor(diffMs / 3600000);
  document.getElementById('totalDays').textContent = totalDays.toLocaleString() + ' 天';
  document.getElementById('totalHours').textContent = totalHours.toLocaleString() + ' 小時';

  var nextBday = new Date(now.getFullYear(), bMonth, bDay);
  if (nextBday <= now) { nextBday = new Date(now.getFullYear() + 1, bMonth, bDay); }
  document.getElementById('nextBday').textContent = nextBday.getFullYear() + '/' + (nextBday.getMonth()+1) + '/' + nextBday.getDate();
  var bdayDiff = Math.ceil((nextBday.getTime() - now.getTime()) / 86400000);
  document.getElementById('bdayCountdown').textContent = bdayDiff + ' 天';

  resultEl.style.display = 'block';
}
</script>
