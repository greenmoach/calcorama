<div class="card">
  <h1>倒數日計算機</h1>
  <p class="subtitle">設定目標日期，即時倒數計時</p>
  <label for="targetDate">目標日期</label>
  <input type="date" id="targetDate">
  <button onclick="startCountdown()">開始倒數</button>
  <div class="error" id="error"></div>
  <div class="result" id="result">
    <h2 id="targetLabel"></h2>
    <div class="countdown-grid">
      <div class="countdown-item"><div class="num" id="cDays">0</div><div class="lbl">天</div></div>
      <div class="countdown-item"><div class="num" id="cHours">0</div><div class="lbl">小時</div></div>
      <div class="countdown-item"><div class="num" id="cMinutes">0</div><div class="lbl">分鐘</div></div>
      <div class="countdown-item"><div class="num" id="cSeconds">0</div><div class="lbl">秒</div></div>
    </div>
    <div class="total-days" id="totalDays"></div>
  </div>
</div>
<script>
let timer = null;
function startCountdown() {
  var errEl = document.getElementById('error');
  var resultEl = document.getElementById('result');
  errEl.textContent = '';
  var val = document.getElementById('targetDate').value;
  if (!val) { errEl.textContent = '請選擇目標日期'; return; }
  var parts = val.split('-');
  var targetYear = parseInt(parts[0], 10);
  var targetMonth = parseInt(parts[1], 10) - 1;
  var targetDay = parseInt(parts[2], 10);
  var target = new Date(targetYear, targetMonth, targetDay, 0, 0, 0);
  if (isNaN(target.getTime())) { errEl.textContent = '日期格式不正確'; return; }
  document.getElementById('targetLabel').textContent = '距離 ' + targetYear + '/' + (targetMonth+1) + '/' + targetDay;
  resultEl.style.display = 'block';
  if (timer) clearInterval(timer);
  function update() {
    var now = new Date();
    var diff = target.getTime() - now.getTime();
    if (diff <= 0) {
      document.getElementById('cDays').textContent = '0';
      document.getElementById('cHours').textContent = '0';
      document.getElementById('cMinutes').textContent = '0';
      document.getElementById('cSeconds').textContent = '0';
      document.getElementById('totalDays').textContent = '已到達目標日期！';
      clearInterval(timer);
      return;
    }
    var totalSec = Math.floor(diff / 1000);
    var days = Math.floor(totalSec / 86400);
    var hours = Math.floor((totalSec % 86400) / 3600);
    var minutes = Math.floor((totalSec % 3600) / 60);
    var seconds = totalSec % 60;
    document.getElementById('cDays').textContent = String(days);
    document.getElementById('cHours').textContent = String(hours);
    document.getElementById('cMinutes').textContent = String(minutes);
    document.getElementById('cSeconds').textContent = String(seconds);
    document.getElementById('totalDays').textContent = '總共還剩 ' + days + ' 天';
  }
  update();
  timer = setInterval(update, 1000);
}
</script>
