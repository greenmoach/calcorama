<div class="card">
<h1>工作日計算機</h1>
<p class="subtitle">排除週末，計算工作天數</p>
<label for="start">開始日期</label>
<input type="date" id="start">
<label for="end">結束日期</label>
<input type="date" id="end">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="big" id="rDays"></div>
  <div class="sub">工作天（不含週末）</div>
  <div class="result-row"><span class="result-label">總日曆天數</span><span class="result-value" id="rTotal"></span></div>
  <div class="result-row"><span class="result-label">週末天數</span><span class="result-value" id="rWeekend"></span></div>
  <div class="result-row"><span class="result-label">週一至週五</span><span class="result-value" id="rWork"></span></div>
</div>
</div>
<script>
function calculate(){
  var s=document.getElementById('start').value;
  var e=document.getElementById('end').value;
  if(!s||!e){alert('請選擇開始與結束日期');return;}
  var start=new Date(s),end=new Date(e);
  if(start>end){alert('開始日期不能晚於結束日期');return;}
  var totalDays=Math.round((end-start)/86400000)+1;
  var workdays=0,weekend=0;
  var d=new Date(start);
  while(d<=end){
    var day=d.getDay();
    if(day===0||day===6)weekend++;else workdays++;
    d.setDate(d.getDate()+1);
  }
  document.getElementById('rDays').textContent=workdays;
  document.getElementById('rTotal').textContent=totalDays+' 天';
  document.getElementById('rWeekend').textContent=weekend+' 天';
  document.getElementById('rWork').textContent=workdays+' 天';
  document.getElementById('result').style.display='block';
}
</script>
