<div class="card">
  <h1>日期加減計算機</h1>
  <p class="subtitle">從指定日期加減天數、月數或年數</p>
  <label for="baseDate">起始日期</label>
  <input type="date" id="baseDate">
  <div style="margin-top:16px;">
    <div class="row3">
      <div><label for="addYears">年數</label><input type="number" id="addYears" value="0" placeholder="0"></div>
      <div><label for="addMonths">月數</label><input type="number" id="addMonths" value="0" placeholder="0"></div>
      <div><label for="addDays">天數</label><input type="number" id="addDays" value="0" placeholder="0"></div>
    </div>
    <p class="hint">輸入負數即為減去</p>
  </div>
  <button onclick="calcAdd()">計算結果</button>
  <div class="error" id="error"></div>
  <div class="result" id="result">
    <h2>計算結果</h2>
    <div class="result-date" id="resultDate"></div>
    <div class="result-weekday" id="resultWeekday"></div>
  </div>
</div>
<script>
var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
function calcAdd() {
  var errEl = document.getElementById('error');
  var resultEl = document.getElementById('result');
  errEl.textContent = '';
  var val = document.getElementById('baseDate').value;
  if (!val) { errEl.textContent = '請選擇起始日期'; return; }
  var parts = val.split('-');
  var y = parseInt(parts[0],10), m = parseInt(parts[1],10)-1, d = parseInt(parts[2],10);
  var addY = parseInt(document.getElementById('addYears').value,10) || 0;
  var addM = parseInt(document.getElementById('addMonths').value,10) || 0;
  var addD = parseInt(document.getElementById('addDays').value,10) || 0;

  // Add years and months first
  var newY = y + addY;
  var newM = m + addM;
  // Normalize month
  while (newM > 11) { newY++; newM -= 12; }
  while (newM < 0) { newY--; newM += 12; }
  // Clamp day to last day of target month
  var maxDay = new Date(newY, newM + 1, 0).getDate();
  var newD = d > maxDay ? maxDay : d;
  var result = new Date(newY, newM, newD);
  // Add days
  result.setDate(result.getDate() + addD);

  var rY = result.getFullYear();
  var rM = result.getMonth() + 1;
  var rD = result.getDate();
  document.getElementById('resultDate').textContent = rY + ' / ' + (rM < 10 ? '0' : '') + rM + ' / ' + (rD < 10 ? '0' : '') + rD;
  document.getElementById('resultWeekday').textContent = weekdays[result.getDay()];
  resultEl.style.display = 'block';
}
</script>
