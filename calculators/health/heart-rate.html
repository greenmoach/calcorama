<div class="card">
<h1>心率區間計算機</h1>
<p class="subtitle">年齡 → 最大心率 ＋ 運動心率區間</p>
<label for="age">年齡（歲）</label>
<input type="number" id="age" placeholder="例如：30" min="10" max="100" step="1">
<label for="rhr">靜息心率（選填，bpm）</label>
<input type="number" id="rhr" placeholder="例如：65（可留空）" min="30" max="120" step="1">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="mhr-box"><div class="mhr-val" id="rMhr"></div><div class="mhr-label">最大心率 (MHR = 220 - 年齡)</div></div>
  <div id="rZones"></div>
</div>
</div>
<script>
var zones=[
  {name:'熱身區',desc:'熱身/恢復',pct:[50,60],color:'#74b9ff'},
  {name:'有氧燃脂',desc:'燃脂/提升心肺',pct:[60,70],color:'#55efc4'},
  {name:'有氧耐力',desc:'增加耐力',pct:[70,80],color:'#f9ca24'},
  {name:'無氧閾值',desc:'提升速度表現',pct:[80,90],color:'#fd79a8'},
  {name:'最大強度',desc:'爆發力訓練',pct:[90,100],color:'#d63031'}
];
function calculate(){
  var age=parseInt(document.getElementById('age').value);
  var rhr=parseInt(document.getElementById('rhr').value)||null;
  if(!age||age<10){alert('請輸入有效年齡');return;}
  var mhr=220-age;
  document.getElementById('rMhr').textContent=mhr+' bpm';
  var html='';
  zones.forEach(function(z){
    var low,high;
    if(rhr){low=Math.round((mhr-rhr)*z.pct[0]/100+rhr);high=Math.round((mhr-rhr)*z.pct[1]/100+rhr);}
    else{low=Math.round(mhr*z.pct[0]/100);high=Math.round(mhr*z.pct[1]/100);}
    html+='<div class="zone" style="background:'+z.color+'"><div><div class="zone-name">'+z.name+' ('+z.pct[0]+'-'+z.pct[1]+'%)</div><div class="zone-desc">'+z.desc+'</div></div><div class="zone-range">'+low+'-'+high+' bpm</div></div>';
  });
  document.getElementById('rZones').innerHTML=html;
  document.getElementById('result').style.display='block';
}
</script>
