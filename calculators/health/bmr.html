<div class="float-circle fc1"></div>
<div class="float-circle fc2"></div>
<div class="float-circle fc3"></div>
<div class="float-circle fc4"></div>
<div class="float-circle fc5"></div>
<div class="card">
<h1>BMR 基礎代謝率</h1>
<p class="subtitle">Mifflin-St Jeor 公式</p>
<label>性別</label>
<div class="gender-group">
<div class="gender-btn active" id="gMale" onclick="setGender('male')">男性</div>
<div class="gender-btn" id="gFemale" onclick="setGender('female')">女性</div>
</div>
<label for="age">年齡（歲）</label>
<input type="number" id="age" placeholder="例如：30" min="1" max="120">
<label for="height">身高（公分）</label>
<input type="number" id="height" placeholder="例如：170" min="50" max="250" step="0.1">
<label for="weight">體重（公斤）</label>
<input type="number" id="weight" placeholder="例如：65" min="10" max="300" step="0.1">
<button class="btn" onclick="calcBMR()">計算 BMR</button>
<div class="result" id="result">
<div class="bmr-value" id="bmrValue"></div>
<div class="bmr-unit">大卡 / 天（kcal/day）</div>
<div class="bmr-detail" id="bmrDetail"></div>
</div>
</div>
<script>
var gender='male';
function setGender(g){
  gender=g;
  document.getElementById('gMale').className='gender-btn'+(g==='male'?' active':'');
  document.getElementById('gFemale').className='gender-btn'+(g==='female'?' active':'');
}
function calcBMR(){
  var age=parseFloat(document.getElementById('age').value);
  var h=parseFloat(document.getElementById('height').value);
  var w=parseFloat(document.getElementById('weight').value);
  if(!age||!h||!w||age<=0||h<=0||w<=0){alert('請填寫所有欄位');return;}
  var bmr;
  if(gender==='male'){bmr=10*w+6.25*h-5*age+5;}
  else{bmr=10*w+6.25*h-5*age-161;}
  var bmrRound=Math.round(bmr);
  document.getElementById('bmrValue').textContent=bmrRound.toLocaleString();
  document.getElementById('bmrDetail').innerHTML='這代表您的身體在完全靜止狀態下，每天需要約 <strong>'+bmrRound+'</strong> 大卡來維持基本生理功能，包括呼吸、循環、細胞修復等。';
  document.getElementById('result').style.display='block';
}
</script>
