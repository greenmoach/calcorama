body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#c8f5e6 0%,#a0e8d0 30%,#7ecfc0 60%,#5cb8a8 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;}
.float-circle{position:fixed;border-radius:50%;background:rgba(255,255,255,0.12);pointer-events:none;animation:floatUp 8s ease-in-out infinite;}
.fc1{width:120px;height:120px;top:10%;left:5%;animation-delay:0s;}
.fc2{width:80px;height:80px;top:60%;right:8%;animation-delay:2s;}
.fc3{width:60px;height:60px;bottom:15%;left:15%;animation-delay:4s;}
.fc4{width:100px;height:100px;top:25%;right:20%;animation-delay:1s;}
.fc5{width:45px;height:45px;bottom:30%;right:30%;animation-delay:3s;}
@keyframes floatUp{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.08);}}
.card{background:rgba(255,255,255,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(60,160,130,0.18);padding:48px 40px;max-width:480px;width:100%;position:relative;z-index:2;}
h1{text-align:center;color:#2a8a6e;font-size:1.8rem;margin-bottom:8px;font-weight:800;}
.subtitle{text-align:center;color:#6abfa8;font-size:0.95rem;margin-bottom:28px;}
label{display:block;color:#3a9a80;font-weight:700;margin-bottom:6px;font-size:0.92rem;}
input,select{width:100%;padding:14px 16px;border:2px solid #b8e8d8;border-radius:14px;font-size:1rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .3s;background:rgba(255,255,255,0.7);margin-bottom:18px;-webkit-appearance:none;}
input:focus,select:focus{border-color:#4aad8e;}
.gender-group{display:flex;gap:12px;margin-bottom:18px;}
.gender-btn{flex:1;padding:14px;border:2px solid #b8e8d8;border-radius:14px;background:rgba(255,255,255,0.7);font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;text-align:center;transition:all .3s;color:#6abfa8;}
.gender-btn.active{border-color:#4aad8e;background:#4aad8e;color:#fff;}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#5cb8a8,#3a9a80);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .2s,box-shadow .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(60,160,130,0.35);}
.result{margin-top:24px;display:none;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:16px;background:rgba(74,173,142,0.08);border-radius:14px;margin-bottom:12px;}
.res-label{color:#3a9a80;font-weight:700;font-size:0.95rem;}

@media(max-width:500px){.card{padding:32px 20px;border-radius:20px;}h1{font-size:1.5rem;}.res-val{font-size:1.3rem;}}
</style>

<a href="../../index.html" style="position:fixed;top:18px;left:18px;z-index:10;color:#4aad8e;text-decoration:none;font-weight:700;font-size:0.95rem;">&#10094; 返回首頁</a>
<div class="float-circle fc1"></div>
<div class="float-circle fc2"></div>
<div class="float-circle fc3"></div>
<div class="float-circle fc4"></div>
<div class="float-circle fc5"></div>
<div class="card">
<h1>TDEE 計算機</h1>
<p class="subtitle">每日總熱量消耗</p>
<label>性別</label>
<div class="gender-group">
<div class="gender-btn active" id="gMale" onclick="setGender('male')">男性</div>
<div class="gender-btn" id="gFemale" onclick="setGender('female')">女性</div>
</div>
<label for="age">年齡（歲）</label>
<input type="number" id="age" placeholder="例如：30" min="1" max="120">
<label for="height">身高（公分）</label>
<input type="number" id="height" placeholder="例如：170" min="50" max="250" step="0.1">
<label for="weight">體重（公斤）</label>
<input type="number" id="weight" placeholder="例如：65" min="10" max="300" step="0.1">
<label for="activity">活動量</label>
<select id="activity">
<option value="1.2">久坐不動（辦公室工作）</option>
<option value="1.375">輕度活動（每週運動 1-3 天）</option>
<option value="1.55" selected>中度活動（每週運動 3-5 天）</option>
<option value="1.725">高度活動（每週運動 6-7 天）</option>
<option value="1.9">非常高度活動（體力勞動/運動員）</option>
</select>
<button class="btn" onclick="calcTDEE()">計算 TDEE</button>
<div class="result" id="result">
<div class="res-row">
<div><div class="res-label">BMR 基礎代謝率</div><div class="res-unit">大卡/天</div></div>
<div class="res-val" id="bmrVal"></div>
</div>
<div class="res-row" style="background:rgba(74,173,142,0.15);">
<div><div class="res-label">TDEE 每日總消耗</div><div class="res-unit">大卡/天</div></div>
<div class="res-val" id="tdeeVal" style="color:#2a8a6e;"></div>
</div>
<p class="tip">減脂建議攝取 TDEE 的 80-90%<br>增肌建議攝取 TDEE 的 110-120%</p>
</div>
</div>
<script>
var gender='male';
function setGender(g){
  gender=g;
  document.getElementById('gMale').className='gender-btn'+(g==='male'?' active':'');
  document.getElementById('gFemale').className='gender-btn'+(g==='female'?' active':'');
}
function calcTDEE(){
  var age=parseFloat(document.getElementById('age').value);
  var h=parseFloat(document.getElementById('height').value);
  var w=parseFloat(document.getElementById('weight').value);
  var act=parseFloat(document.getElementById('activity').value);
  if(!age||!h||!w||age<=0||h<=0||w<=0){alert('請填寫所有欄位');return;}
  var bmr;
  if(gender==='male'){bmr=10*w+6.25*h-5*age+5;}
  else{bmr=10*w+6.25*h-5*age-161;}
  var tdee=bmr*act;
  document.getElementById('bmrVal').textContent=Math.round(bmr).toLocaleString();
  document.getElementById('tdeeVal').textContent=Math.round(tdee).toLocaleString();
  document.getElementById('result').style.display='block';
}
</script>
