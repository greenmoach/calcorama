body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#c8f5e6 0%,#a0e8d0 30%,#7ecfc0 60%,#5cb8a8 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden;}

.fc2{width:80px;height:80px;top:60%;right:8%;animation-delay:2s;}
.fc3{width:60px;height:60px;bottom:15%;left:15%;animation-delay:4s;}
.fc4{width:100px;height:100px;top:25%;right:20%;animation-delay:1s;}
.fc5{width:45px;height:45px;bottom:30%;right:30%;animation-delay:3s;}
@keyframes floatUp{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.08);}}
.card{background:rgba(255,255,255,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(60,160,130,0.18);padding:48px 40px;max-width:460px;width:100%;position:relative;z-index:2;}

<div class="float-circle fc1"></div>
<div class="float-circle fc2"></div>
<div class="float-circle fc3"></div>
<div class="float-circle fc4"></div>
<div class="float-circle fc5"></div>
<div class="card">
<h1>BMI 計算機</h1>
<p class="subtitle">身體質量指數計算</p>
<label for="height">身高（公分）</label>
<input type="number" id="height" placeholder="例如：170" min="50" max="250" step="0.1">
<label for="weight">體重（公斤）</label>
<input type="number" id="weight" placeholder="例如：65" min="10" max="300" step="0.1">
<button class="btn" onclick="calcBMI()">計算 BMI</button>
<div class="result" id="result">
<div class="bmi-value" id="bmiValue"></div>
<div class="bmi-label" id="bmiLabel"></div>
<div class="bmi-info">
過輕：BMI &lt; 18.5<br>
正常：18.5 ≤ BMI &lt; 25<br>
過重：25 ≤ BMI &lt; 30<br>
肥胖：BMI ≥ 30
</div>
</div>
</div>
<script>
function calcBMI(){
  var h=parseFloat(document.getElementById('height').value);
  var w=parseFloat(document.getElementById('weight').value);
  if(!h||!w||h<=0||w<=0){alert('請輸入有效的身高與體重');return;}
  var hm=h/100;
  var bmi=w/(hm*hm);
  var bmiRound=Math.round(bmi*10)/10;
  var label='',color='';
  if(bmi<18.5){label='過輕';color='#5ba8c8';}
  else if(bmi<25){label='正常';color='#4aad8e';}
  else if(bmi<30){label='過重';color='#d4a843';}
  else{label='肥胖';color='#d05a5a';}
  document.getElementById('bmiValue').textContent=bmiRound;
  document.getElementById('bmiValue').style.color=color;
  var el=document.getElementById('bmiLabel');
  el.textContent=label;
  el.style.background=color;
  document.getElementById('result').style.display='block';
}
</script>
