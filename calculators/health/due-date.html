<h1>預產期計算機</h1>
<p class="subtitle">末次月經日 → 預產期</p>
<label for="lmp">末次月經第一天</label>
<input type="date" id="lmp">
<button class="calc-btn" onclick="calculate()">計算預產期</button>
<div class="result" id="result">
  <div class="due-date" id="rDue"></div>
  <div class="result-row"><span class="result-label">末次月經日</span><span class="result-value" id="rLmp"></span></div>
  <div class="result-row"><span class="result-label">目前懷孕週數</span><span class="result-value" id="rWeeks"></span></div>
  <div class="result-row"><span class="result-label">距預產期</span><span class="result-value" id="rDays"></span></div>
  <div class="result-row"><span class="result-label">第一孕期結束</span><span class="result-value" id="rTri1"></span></div>
  <div class="result-row"><span class="result-label">第二孕期結束</span><span class="result-value" id="rTri2"></span></div>
  <div class="note">※ 以 Naegele 法則（LMP + 280天）計算，實際預產期請諮詢醫師</div>
</div>
</div>
<script>
var wdays=['日','一','二','三','四','五','六'];
function fmtDate(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（週'+wdays[d.getDay()]+'）';}
function calculate(){
  var lmpVal=document.getElementById('lmp').value;
  if(!lmpVal){alert('請選擇末次月經日期');return;}
  var lmp=new Date(lmpVal);
  var due=new Date(lmp);due.setDate(due.getDate()+280);
  var today=new Date();today.setHours(0,0,0,0);
  var diffMs=today-lmp;
  var diffDays=Math.floor(diffMs/86400000);
  var weeks=Math.floor(diffDays/7);
  var extraDays=diffDays%7;
  var daysLeft=Math.ceil((due-today)/86400000);
  var tri1=new Date(lmp);tri1.setDate(tri1.getDate()+84);
  var tri2=new Date(lmp);tri2.setDate(tri2.getDate()+196);
  document.getElementById('rDue').textContent='預產期：'+fmtDate(due);
  document.getElementById('rLmp').textContent=fmtDate(lmp);
  document.getElementById('rWeeks').textContent=diffDays>=0?weeks+'週'+extraDays+'天':'尚未開始計算';
  document.getElementById('rDays').textContent=daysLeft>0?daysLeft+' 天':daysLeft===0?'今天！':'已過預產期';
  document.getElementById('rTri1').textContent=fmtDate(tri1)+' (第12週)';
  document.getElementById('rTri2').textContent=fmtDate(tri2)+' (第28週)';
  document.getElementById('result').style.display='block';
}
</script>
