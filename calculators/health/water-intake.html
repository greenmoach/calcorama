.floating:nth-child(3){width:60px;height:60px;background:#2a8a6e;bottom:15%;left:15%;animation-delay:4s}
@keyframes floatAnim{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(60,160,130,.18);padding:40px 36px;max-width:480px;width:100%;position:relative;z-index:2}

<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>喝水量計算機</h1>
<p class="subtitle">體重 / 活動量 → 建議每日喝水量</p>
<label for="weight">體重（公斤）</label>
<input type="number" id="weight" placeholder="例如：65" min="1" step="0.1">
<label for="activity">活動程度</label>
<select id="activity">
  <option value="1">久坐（辦公室工作）</option>
  <option value="1.2" selected>輕度活動（每週運動 1-3 天）</option>
  <option value="1.4">中度活動（每週運動 3-5 天）</option>
  <option value="1.6">高度活動（每天運動）</option>
  <option value="1.8">非常高度（每天激烈運動）</option>
</select>
<label for="climate">氣候</label>
<select id="climate">
  <option value="0">溫和氣候</option>
  <option value="300">炎熱氣候（+300ml）</option>
</select>
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="big" id="rMl"></div>
  <div class="unit">毫升 / 天</div>
  <div class="cups" id="rCups"></div>
  <div class="tip">每天分 8~10 次飲用效果最佳<br>運動前後及起床後要補充水分</div>
</div>
</div>
<script>
function calculate(){
  var w=parseFloat(document.getElementById('weight').value);
  var act=parseFloat(document.getElementById('activity').value);
  var climate=parseFloat(document.getElementById('climate').value);
  if(!w||w<=0){alert('請輸入體重');return;}
  var base=w*35*act+climate;
  var cups=Math.ceil(base/250);
  document.getElementById('rMl').textContent=Math.round(base);
  document.getElementById('rCups').textContent='約 '+cups+' 杯（250ml）';
  document.getElementById('result').style.display='block';
}
</script>
