<div class="float-circle fc3"></div>

<div class="float-circle fc5"></div>
<div class="card">
<h1>理想體重計算機</h1>
<p class="subtitle">根據身高與性別計算理想體重</p>
<label>性別</label>
<div class="gender-group">
<div class="gender-btn active" id="gMale" onclick="setGender('male')">男性</div>
<div class="gender-btn" id="gFemale" onclick="setGender('female')">女性</div>
</div>
<label for="height">身高（公分）</label>
<input type="number" id="height" placeholder="例如：170" min="100" max="250" step="0.1">
<button class="btn" onclick="calc()">計算理想體重</button>
<div class="result" id="result">
<div class="res-box">
<div class="res-title">BMI 健康體重範圍（BMI 18.5 ~ 24.9）</div>
<div class="res-range" id="bmiRange"></div>
<div class="res-sub">公斤</div>
</div>
<div class="devine-box">
<div class="res-title">Devine 公式理想體重</div>
<div class="devine-val" id="devineVal"></div>
<div class="res-sub" id="devineSub"></div>
</div>
</div>
</div>
<script>
var gender='male';
function setGender(g){
  gender=g;
  document.getElementById('gMale').className='gender-btn'+(g==='male'?' active':'');
  document.getElementById('gFemale').className='gender-btn'+(g==='female'?' active':'');
}
function calc(){
  var h=parseFloat(document.getElementById('height').value);
  if(!h||h<=0){alert('請輸入有效的身高');return;}
  var hm=h/100;
  var low=Math.round(18.5*hm*hm*10)/10;
  var high=Math.round(24.9*hm*hm*10)/10;
  document.getElementById('bmiRange').textContent=low+' ~ '+high;
  // Devine formula: Male: 50 + 2.3*(height_in - 60), Female: 45.5 + 2.3*(height_in - 60)
  var inches=h/2.54;
  var devine;
  if(gender==='male'){devine=50+2.3*(inches-60);}
  else{devine=45.5+2.3*(inches-60);}
  devine=Math.round(devine*10)/10;
  document.getElementById('devineVal').textContent=devine+' 公斤';
  document.getElementById('devineSub').textContent=gender==='male'?'男性：50 + 2.3 × (身高英吋 - 60)':'女性：45.5 + 2.3 × (身高英吋 - 60)';
  document.getElementById('result').style.display='block';
}
</script>
