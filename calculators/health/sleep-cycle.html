<div class="card">
<h1>睡眠週期計算機</h1>
<p class="subtitle">入睡時間 → 最佳起床時間</p>
<label for="mode">計算方式</label>
<select id="mode" onchange="toggleMode()">
  <option value="sleep">設定入睡時間，計算起床時間</option>
  <option value="wake">設定起床時間，計算入睡時間</option>
</select>
<label id="timeLabel" for="sleepTime">入睡時間</label>
<input type="time" id="sleepTime" value="23:00">
<label for="fallAsleep">入睡所需時間（分鐘）</label>
<input type="number" id="fallAsleep" value="14" min="0" max="60" step="1">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="result-title" id="rTitle"></div>
  <div id="rTimes"></div>
  <div class="note">每個睡眠週期約 90 分鐘（建議完成 5~6 個週期）</div>
</div>
</div>
<script>
function toggleMode(){
  var mode=document.getElementById('mode').value;
  document.getElementById('timeLabel').textContent=mode==='sleep'?'入睡時間':'起床時間';
}
function fmtTime(totalMin){
  var h=Math.floor(((totalMin%1440)+1440)%1440/60);
  var m=((totalMin%1440)+1440)%1440%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function calculate(){
  var mode=document.getElementById('mode').value;
  var timeVal=document.getElementById('sleepTime').value;
  var fallAsleep=parseInt(document.getElementById('fallAsleep').value)||14;
  if(!timeVal){alert('請輸入時間');return;}
  var parts=timeVal.split(':');
  var baseMin=parseInt(parts[0])*60+parseInt(parts[1]);
  var html='';
  for(var c=3;c<=6;c++){
    var cycleMin=c*90;
    var wakeMin;
    if(mode==='sleep'){wakeMin=baseMin+fallAsleep+cycleMin;}
    else{wakeMin=baseMin-fallAsleep-cycleMin;}
    html+='<div class="time-item"><span class="time-cycles">'+c+' 個週期（'+Math.floor(cycleMin/60)+'h'+cycleMin%60+'m）</span><span class="time-val">'+fmtTime(wakeMin)+'</span></div>';
  }
  document.getElementById('rTitle').textContent=mode==='sleep'?'建議起床時間':'建議入睡時間';
  document.getElementById('rTimes').innerHTML=html;
  document.getElementById('result').style.display='block';
}
</script>
