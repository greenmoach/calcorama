<div class="float-circle fc1"></div>
<div class="float-circle fc2"></div>
<div class="float-circle fc3"></div>
<div class="float-circle fc4"></div>
<div class="float-circle fc5"></div>
<div class="card">
<h1>體脂率計算機</h1>
<p class="subtitle">美國海軍體脂估算法</p>
<label>性別</label>
<div class="gender-group">
<div class="gender-btn active" id="gMale" onclick="setGender('male')">男性</div>
<div class="gender-btn" id="gFemale" onclick="setGender('female')">女性</div>
</div>
<label for="height">身高（公分）</label>
<input type="number" id="height" placeholder="例如：170" min="100" max="250" step="0.1">
<label for="neck">頸圍（公分）</label>
<input type="number" id="neck" placeholder="例如：38" min="20" max="60" step="0.1">
<label for="waist">腰圍（公分）</label>
<input type="number" id="waist" placeholder="例如：80" min="40" max="180" step="0.1">
<div class="hip-field" id="hipField">
<label for="hip">臀圍（公分）</label>
<input type="number" id="hip" placeholder="例如：95" min="50" max="200" step="0.1">
</div>
<button class="btn" onclick="calc()">計算體脂率</button>
<div class="result" id="result">
<div class="bf-value" id="bfValue"></div>
<div class="bf-unit">% 體脂率</div>
<div class="bf-cat" id="bfCat"></div>
<table class="bf-table" id="bfTable"></table>
</div>
</div>
<script>
var gender='male';
function setGender(g){
  gender=g;
  document.getElementById('gMale').className='gender-btn'+(g==='male'?' active':'');
  document.getElementById('gFemale').className='gender-btn'+(g==='female'?' active':'');
  document.getElementById('hipField').style.display=g==='female'?'block':'none';
}
function calc(){
  var h=parseFloat(document.getElementById('height').value);
  var neck=parseFloat(document.getElementById('neck').value);
  var waist=parseFloat(document.getElementById('waist').value);
  if(!h||!neck||!waist||h<=0||neck<=0||waist<=0){alert('請填寫所有欄位');return;}
  var bf;
  if(gender==='male'){
    if(waist-neck<=0){alert('腰圍必須大於頸圍');return;}
    bf=495/(1.0324-0.19077*Math.log10(waist-neck)+0.15456*Math.log10(h))-450;
  }else{
    var hip=parseFloat(document.getElementById('hip').value);
    if(!hip||hip<=0){alert('請填寫臀圍');return;}
    if(waist+hip-neck<=0){alert('數值有誤，請檢查');return;}
    bf=495/(1.29579-0.35004*Math.log10(waist+hip-neck)+0.22100*Math.log10(h))-450;
  }
  bf=Math.round(bf*10)/10;
  if(bf<0)bf=0;
  document.getElementById('bfValue').textContent=bf;
  var cat='',color='';
  if(gender==='male'){
    if(bf<6){cat='必需脂肪';color='#5ba8c8';}
    else if(bf<14){cat='運動員';color='#4aad8e';}
    else if(bf<18){cat='健康';color='#6abfa8';}
    else if(bf<25){cat='一般';color='#d4a843';}
    else{cat='肥胖';color='#d05a5a';}
  }else{
    if(bf<14){cat='必需脂肪';color='#5ba8c8';}
    else if(bf<21){cat='運動員';color='#4aad8e';}
    else if(bf<25){cat='健康';color='#6abfa8';}
    else if(bf<32){cat='一般';color='#d4a843';}
    else{cat='肥胖';color='#d05a5a';}
  }
  var el=document.getElementById('bfCat');
  el.textContent=cat;el.style.background=color;
  var tbl=document.getElementById('bfTable');
  if(gender==='male'){
    tbl.innerHTML='<tr><td>必需脂肪</td><td>2-5%</td></tr><tr><td>運動員</td><td>6-13%</td></tr><tr><td>健康</td><td>14-17%</td></tr><tr><td>一般</td><td>18-24%</td></tr><tr><td>肥胖</td><td>25%+</td></tr>';
  }else{
    tbl.innerHTML='<tr><td>必需脂肪</td><td>10-13%</td></tr><tr><td>運動員</td><td>14-20%</td></tr><tr><td>健康</td><td>21-24%</td></tr><tr><td>一般</td><td>25-31%</td></tr><tr><td>肥胖</td><td>32%+</td></tr>';
  }
  document.getElementById('result').style.display='block';
}
</script>
