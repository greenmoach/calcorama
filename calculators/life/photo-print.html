<h1>照片沖印尺寸計算機</h1>
<p class="subtitle">輸入像素 → 查看可沖印的照片尺寸</p>
<label for="pw">照片寬度（像素）</label>
<input type="number" id="pw" placeholder="例如：4000" min="1" step="1">
<label for="ph">照片高度（像素）</label>
<input type="number" id="ph" placeholder="例如：3000" min="1" step="1">
<button class="calc-btn" onclick="calculate()">計算可沖印尺寸</button>
<div class="result" id="result"></div>
</div>
<script>
var sizes=[
  {name:'2吋（護照）',w:413,h:531,label:'413×531 px'},
  {name:'3吋',w:900,h:1200,label:'900×1200 px'},
  {name:'4吋（10×15cm）',w:1200,h:1800,label:'1200×1800 px'},
  {name:'5吋（13×18cm）',w:1500,h:2100,label:'1500×2100 px'},
  {name:'6吋（15×20cm）',w:1800,h:2400,label:'1800×2400 px'},
  {name:'8吋（20×25cm）',w:2400,h:3000,label:'2400×3000 px'},
  {name:'10吋（25×30cm）',w:3000,h:3600,label:'3000×3600 px'},
  {name:'A4（21×29.7cm）',w:2480,h:3508,label:'2480×3508 px @ 300dpi'},
  {name:'A3（29.7×42cm）',w:3508,h:4961,label:'3508×4961 px @ 300dpi'}
];
function calculate(){
  var pw=parseFloat(document.getElementById('pw').value);
  var ph=parseFloat(document.getElementById('ph').value);
  if(!pw||!ph||pw<=0||ph<=0){alert('請輸入有效的像素尺寸');return;}
  var html='';
  sizes.forEach(function(s){
    var needW=Math.min(s.w,s.h);var needH=Math.max(s.w,s.h);
    var longSide=Math.max(pw,ph);var shortSide=Math.min(pw,ph);
    var ratio=longSide/shortSide;var needRatio=needH/needW;
    var fits=longSide>=needH&&shortSide>=needW;
    var margin=Math.min(longSide/needH,shortSide/needW);
    var status,cls;
    if(margin>=1.2){status='✓ 高畫質';cls='ok';}
    else if(margin>=1){status='△ 勉強可印';cls='warn';}
    else{status='✗ 像素不足';cls='bad';}
    html+='<div class="print-item"><div><div class="print-name">'+s.name+'</div><div class="print-size">需 '+s.label+'</div></div><span class="print-status '+cls+'">'+status+'</span></div>';
  });
  document.getElementById('result').innerHTML=html;
  document.getElementById('result').style.display='block';
}
</script>
