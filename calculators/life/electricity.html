<div class="floating f1"></div><div class="floating f2"></div><div class="floating f3"></div><div class="floating f4"></div>
<div class="card">
<h1>電費計算機</h1>
<p class="subtitle">估算電器每月電費開銷</p>
<div class="group">
<label>電器功率（瓦特 W）</label>
<input type="number" id="watt" min="0" step="1" placeholder="例：1000">
<div class="hint">常見：冷氣 900~1500W、電風扇 50W、冰箱 100~200W</div>
</div>
<div class="row">
<div class="group"><label>每日使用時數</label><input type="number" id="hours" min="0" max="24" step="0.5" placeholder="例：8"></div>
<div class="group"><label>每月使用天數</label><input type="number" id="days" min="0" max="31" step="1" placeholder="例：30" value="30"></div>
</div>
<div class="group">
<label>電價（元/度）</label>
<input type="number" id="rate" min="0" step="0.1" value="4.5">
<div class="hint">台灣住宅平均約 4~6 元/度（依累進費率不同）</div>
</div>
<button class="calc" onclick="calculate()">計算電費</button>
<div class="result" id="res">
<h3>計算結果</h3>
<div id="resContent"></div>
<div class="highlight">
<div class="lbl">預估每月電費</div>
<div class="big" id="totalCost"></div>
</div>
</div>
</div>
<script>
function calculate(){
  var w=parseFloat(document.getElementById('watt').value);
  var h=parseFloat(document.getElementById('hours').value);
  var d=parseFloat(document.getElementById('days').value);
  var r=parseFloat(document.getElementById('rate').value);
  if(!w||w<0||!h||h<0||!d||d<0||!r||r<0){alert('請輸入有效的數值');return;}
  var dailyKwh=w/1000*h;
  var monthlyKwh=dailyKwh*d;
  var cost=monthlyKwh*r;
  var yearCost=cost*12;
  var html='';
  html+='<div class="r-row"><span>每日用電量</span><span class="rv">'+dailyKwh.toFixed(2)+' 度</span></div>';
  html+='<div class="r-row"><span>每月用電量</span><span class="rv">'+monthlyKwh.toFixed(2)+' 度</span></div>';
  html+='<div class="r-row"><span>電價費率</span><span class="rv">NT$ '+r.toFixed(1)+' / 度</span></div>';
  html+='<div class="r-row"><span>預估年度電費</span><span class="rv">NT$ '+yearCost.toFixed(0)+'</span></div>';
  document.getElementById('resContent').innerHTML=html;
  document.getElementById('totalCost').textContent='NT$ '+cost.toFixed(0);
  document.getElementById('res').style.display='block';
}
</script>
