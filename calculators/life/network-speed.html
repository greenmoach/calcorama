body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#fef9d0 0%,#faeea8 30%,#f5d76e 60%,#d4a520 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}

.floating:nth-child(2){width:80px;height:80px;background:#d4a520;top:60%;right:8%;animation-delay:2s}
.floating:nth-child(3){width:60px;height:60px;background:#8a6a10;bottom:15%;left:15%;animation-delay:4s}

.card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(180,140,20,.18);padding:40px 36px;max-width:480px;width:100%;position:relative;z-index:2}

<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>網速換算計算機</h1>
<p class="subtitle">Mbps ↔ MB/s 及其他單位互轉</p>
<label for="inputVal">數值</label>
<input type="number" id="inputVal" placeholder="例如：100" min="0" step="any">
<label for="fromUnit">單位</label>
<select id="fromUnit">
  <option value="mbps">Mbps（百萬位元/秒）</option>
  <option value="gbps">Gbps（十億位元/秒）</option>
  <option value="kbps">Kbps（千位元/秒）</option>
  <option value="mbs">MB/s（百萬位元組/秒）</option>
  <option value="gbs">GB/s（十億位元組/秒）</option>
  <option value="kbs">KB/s（千位元組/秒）</option>
</select>
<button class="calc-btn" onclick="convert()">換算</button>
<div class="result" id="result">
  <div class="result-row"><span class="result-label">Gbps</span><span class="result-value" id="rGbps"></span></div>
  <div class="result-row"><span class="result-label">Mbps</span><span class="result-value" id="rMbps"></span></div>
  <div class="result-row"><span class="result-label">Kbps</span><span class="result-value" id="rKbps"></span></div>
  <div class="result-row"><span class="result-label">GB/s</span><span class="result-value" id="rGbs"></span></div>
  <div class="result-row"><span class="result-label">MB/s</span><span class="result-value" id="rMbs"></span></div>
  <div class="result-row"><span class="result-label">KB/s</span><span class="result-value" id="rKbs"></span></div>
</div>
</div>
<script>
function convert(){
  var v=parseFloat(document.getElementById('inputVal').value);
  var u=document.getElementById('fromUnit').value;
  if(isNaN(v)||v<0){alert('請輸入有效數值');return;}
  var bps;
  if(u==='mbps')bps=v*1e6;
  else if(u==='gbps')bps=v*1e9;
  else if(u==='kbps')bps=v*1e3;
  else if(u==='mbs')bps=v*8e6;
  else if(u==='gbs')bps=v*8e9;
  else bps=v*8e3;
  function fmt(n){return n>=1?+n.toPrecision(5):n.toExponential(3);}
  document.getElementById('rGbps').textContent=fmt(bps/1e9)+' Gbps';
  document.getElementById('rMbps').textContent=fmt(bps/1e6)+' Mbps';
  document.getElementById('rKbps').textContent=fmt(bps/1e3)+' Kbps';
  document.getElementById('rGbs').textContent=fmt(bps/8e9)+' GB/s';
  document.getElementById('rMbs').textContent=fmt(bps/8e6)+' MB/s';
  document.getElementById('rKbs').textContent=fmt(bps/8e3)+' KB/s';
  document.getElementById('result').style.display='block';
}
</script>
