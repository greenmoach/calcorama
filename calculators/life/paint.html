<div class="floating f1"></div><div class="floating f2"></div><div class="floating f3"></div><div class="floating f4"></div>
<div class="card">
<h1>塗料面積計算機</h1>
<p class="subtitle">精準計算塗料用量，不浪費</p>
<div class="section-title">房間尺寸</div>
<div class="row">
<div class="group"><label>長度（公尺）</label><input type="number" id="rLen" min="0" step="0.1" placeholder="例：5"></div>
<div class="group"><label>寬度（公尺）</label><input type="number" id="rWid" min="0" step="0.1" placeholder="例：4"></div>
</div>
<div class="group"><label>牆面高度（公尺）</label><input type="number" id="rH" min="0" step="0.1" placeholder="例：2.8"></div>
<div class="section-title">扣除門窗面積</div>
<div id="openings">
<div class="sub-row"><span>門窗 1</span><input type="number" min="0" step="0.1" placeholder="寬" class="ow"> <span>x</span> <input type="number" min="0" step="0.1" placeholder="高" class="oh"> <span>公尺</span><button class="btn-rm" onclick="removeOpening(this)">&times;</button></div>
</div>
<button class="btn-add" onclick="addOpening()">+ 新增門窗</button>
<div class="section-title">塗料設定</div>
<div class="row">
<div class="group"><label>塗布率（m²/L）</label><input type="number" id="coverage" value="10" min="0.1" step="0.1"></div>
<div class="group"><label>每罐容量（L）</label><input type="number" id="canSize" value="1" min="0.1" step="0.1"></div>
</div>
<button class="calc" onclick="calculate()">計算用量</button>
<div class="result" id="res">
<h3>計算結果</h3>
<div id="resContent"></div>
</div>
</div>
<script>
var openingCount=1;
function addOpening(){
  openingCount++;
  var d=document.createElement('div');
  d.className='sub-row';
  d.innerHTML='<span>門窗 '+openingCount+'</span><input type="number" min="0" step="0.1" placeholder="寬" class="ow"> <span>x</span> <input type="number" min="0" step="0.1" placeholder="高" class="oh"> <span>公尺</span><button class="btn-rm" onclick="removeOpening(this)">&times;</button>';
  document.getElementById('openings').appendChild(d);
}
function removeOpening(btn){
  var rows=document.getElementById('openings').querySelectorAll('.sub-row');
  if(rows.length>1) btn.parentElement.remove();
}
function calculate(){
  var l=parseFloat(document.getElementById('rLen').value)||0;
  var w=parseFloat(document.getElementById('rWid').value)||0;
  var h=parseFloat(document.getElementById('rH').value)||0;
  if(l<=0||w<=0||h<=0){alert('請輸入有效的房間尺寸');return;}
  var wallArea=(l+w)*2*h;
  var openingArea=0;
  var rows=document.getElementById('openings').querySelectorAll('.sub-row');
  for(var i=0;i<rows.length;i++){
    var ow=parseFloat(rows[i].querySelector('.ow').value)||0;
    var oh=parseFloat(rows[i].querySelector('.oh').value)||0;
    openingArea+=ow*oh;
  }
  var paintArea=wallArea-openingArea;
  if(paintArea<0) paintArea=0;
  var cov=parseFloat(document.getElementById('coverage').value)||10;
  var canSz=parseFloat(document.getElementById('canSize').value)||1;
  var liters=paintArea/cov;
  var cans=Math.ceil(liters/canSz);
  var html='';
  html+='<div class="r-row"><span>牆面總面積</span><span class="rv">'+wallArea.toFixed(2)+' m²</span></div>';
  html+='<div class="r-row"><span>門窗扣除面積</span><span class="rv">'+openingArea.toFixed(2)+' m²</span></div>';
  html+='<div class="r-row"><span>實際塗刷面積</span><span class="rv">'+paintArea.toFixed(2)+' m²</span></div>';
  html+='<div class="r-row"><span>所需塗料量</span><span class="rv">'+liters.toFixed(2)+' L</span></div>';
  html+='<div class="r-row"><span>建議購買罐數</span><span class="rv">'+cans+' 罐（每罐 '+canSz+' L）</span></div>';
  document.getElementById('resContent').innerHTML=html;
  document.getElementById('res').style.display='block';
}
</script>
