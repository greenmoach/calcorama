<div class="floating f1"></div><div class="floating f2"></div><div class="floating f3"></div><div class="floating f4"></div>
<div class="card">
<h1>料理份量換算</h1>
<p class="subtitle">輕鬆調整食譜份量</p>
<div class="row">
<div class="group"><label>原始份數（人份）</label><input type="number" id="origServ" min="1" step="1" placeholder="例：4" value="4"></div>
<div class="group"><label>目標份數（人份）</label><input type="number" id="targetServ" min="1" step="1" placeholder="例：6" value="6"></div>
</div>
<div class="section-title">食材清單</div>
<div id="ingredients">
<div class="ingr-row"><input type="text" placeholder="食材名稱" class="iname"><input type="number" placeholder="數量" min="0" step="0.1" class="iamt"><input type="text" placeholder="單位" class="iunit"><button class="btn-rm" onclick="removeIngr(this)">&times;</button></div>
<div class="ingr-row"><input type="text" placeholder="食材名稱" class="iname"><input type="number" placeholder="數量" min="0" step="0.1" class="iamt"><input type="text" placeholder="單位" class="iunit"><button class="btn-rm" onclick="removeIngr(this)">&times;</button></div>
<div class="ingr-row"><input type="text" placeholder="食材名稱" class="iname"><input type="number" placeholder="數量" min="0" step="0.1" class="iamt"><input type="text" placeholder="單位" class="iunit"><button class="btn-rm" onclick="removeIngr(this)">&times;</button></div>
</div>
<button class="btn-add" onclick="addIngr()">+ 新增食材</button>
<button class="calc" onclick="calculate()">換算份量</button>
<div class="result" id="res">
<h3 id="resTitle"></h3>
<div id="resContent"></div>
</div>
</div>
<script>
function addIngr(){
  var d=document.createElement('div');
  d.className='ingr-row';
  d.innerHTML='<input type="text" placeholder="食材名稱" class="iname"><input type="number" placeholder="數量" min="0" step="0.1" class="iamt"><input type="text" placeholder="單位" class="iunit"><button class="btn-rm" onclick="removeIngr(this)">&times;</button>';
  document.getElementById('ingredients').appendChild(d);
}
function removeIngr(btn){
  var rows=document.getElementById('ingredients').querySelectorAll('.ingr-row');
  if(rows.length>1) btn.parentElement.remove();
}
function calculate(){
  var orig=parseFloat(document.getElementById('origServ').value);
  var target=parseFloat(document.getElementById('targetServ').value);
  if(!orig||!target||orig<=0||target<=0){alert('請輸入有效的份數');return;}
  var ratio=target/orig;
  var rows=document.getElementById('ingredients').querySelectorAll('.ingr-row');
  var html='';
  var hasData=false;
  for(var i=0;i<rows.length;i++){
    var name=rows[i].querySelector('.iname').value.trim();
    var amt=parseFloat(rows[i].querySelector('.iamt').value);
    var unit=rows[i].querySelector('.iunit').value.trim();
    if(name&&!isNaN(amt)){
      hasData=true;
      var newAmt=amt*ratio;
      var display=newAmt%1===0?newAmt.toString():newAmt.toFixed(2);
      html+='<div class="r-row"><span>'+name+'</span><span class="rv">'+display+' '+unit+'</span></div>';
    }
  }
  if(!hasData){alert('請至少輸入一項食材');return;}
  document.getElementById('resTitle').textContent='換算結果（'+orig+' 人份 → '+target+' 人份，比例 '+ratio.toFixed(2)+'）';
  document.getElementById('resContent').innerHTML=html;
  document.getElementById('res').style.display='block';
}
</script>
