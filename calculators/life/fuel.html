.tab-btn{flex:1;padding:10px 0;border:2px solid #e8c840;background:transparent;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;color:#a07800;cursor:pointer;font-size:0.92rem;transition:all 0.2s;}

<div class="floating f1"></div><div class="floating f2"></div><div class="floating f3"></div><div class="floating f4"></div>
<div class="card">
<h1>油耗計算機</h1>
<p class="subtitle">計算您的車輛油耗效率</p>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab(0)">計算油耗</button>
<button class="tab-btn" onclick="switchTab(1)">計算所需油量</button>
</div>
<div id="panel0" class="panel active">
<div class="group"><label>加油量（公升）</label><input type="number" id="fuel" min="0" step="0.1" placeholder="例：40"></div>
<div class="group"><label>行駛距離（公里）</label><input type="number" id="dist" min="0" step="0.1" placeholder="例：500"></div>
<button class="calc" onclick="calcEfficiency()">計算油耗</button>
<div class="result" id="res0">
<h3>油耗結果</h3>
<div class="val" id="kml"></div>
<div class="detail" id="l100"></div>
</div>
</div>
<div id="panel1" class="panel">
<div class="group"><label>油耗效率（km/L）</label><input type="number" id="eff" min="0" step="0.1" placeholder="例：12.5"></div>
<div class="group"><label>預計行駛距離（公里）</label><input type="number" id="dist2" min="0" step="0.1" placeholder="例：300"></div>
<button class="calc" onclick="calcFuelNeeded()">計算所需油量</button>
<div class="result" id="res1">
<h3>所需油量</h3>
<div class="val" id="fuelNeeded"></div>
<div class="detail" id="fuelDetail"></div>
</div>
</div>
</div>
<script>
function switchTab(i){
  document.querySelectorAll('.tab-btn').forEach(function(b,idx){b.classList.toggle('active',idx===i);});
  document.querySelectorAll('.panel').forEach(function(p,idx){p.classList.toggle('active',idx===i);});
}
function calcEfficiency(){
  var f=parseFloat(document.getElementById('fuel').value);
  var d=parseFloat(document.getElementById('dist').value);
  if(!f||!d||f<=0||d<=0){alert('請輸入有效的數值');return;}
  var kml=d/f;
  var l100=f/d*100;
  document.getElementById('kml').textContent=kml.toFixed(2)+' km/L';
  document.getElementById('l100').textContent='每百公里油耗：'+l100.toFixed(2)+' L/100km';
  document.getElementById('res0').style.display='block';
}
function calcFuelNeeded(){
  var e=parseFloat(document.getElementById('eff').value);
  var d=parseFloat(document.getElementById('dist2').value);
  if(!e||!d||e<=0||d<=0){alert('請輸入有效的數值');return;}
  var needed=d/e;
  document.getElementById('fuelNeeded').textContent=needed.toFixed(2)+' 公升';
  document.getElementById('fuelDetail').textContent='以油耗 '+e+' km/L 行駛 '+d+' 公里';
  document.getElementById('res1').style.display='block';
}
</script>
