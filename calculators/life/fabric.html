<div class="card">
<h1>布料用量計算機</h1>
<p class="subtitle">版型尺寸 → 需要多少布料</p>
<label for="patW">版型寬度（公分）</label>
<input type="number" id="patW" placeholder="例如：60" min="1" step="0.1">
<label for="patH">版型長度（公分）</label>
<input type="number" id="patH" placeholder="例如：80" min="1" step="0.1">
<label for="qty">版型數量（件）</label>
<input type="number" id="qty" placeholder="例如：2" min="1" step="1" value="1">
<label for="fabricW">布料門幅（公分）</label>
<select id="fabricW">
  <option value="90">90 cm（窄幅）</option>
  <option value="110">110 cm</option>
  <option value="150" selected>150 cm（寬幅）</option>
  <option value="180">180 cm（特寬）</option>
</select>
<label for="seam">縫份（公分）</label>
<input type="number" id="seam" placeholder="例如：2" min="0" step="0.5" value="2">
<button class="calc-btn" onclick="calculate()">計算用布量</button>
<div class="result" id="result">
  <div class="big" id="rLen"></div>
  <div class="sub">需要布料長度</div>
  <div class="result-row"><span class="result-label">版型（含縫份）</span><span class="result-value" id="rPat"></span></div>
  <div class="result-row"><span class="result-label">每排可放件數</span><span class="result-value" id="rPerRow"></span></div>
  <div class="result-row"><span class="result-label">所需排數</span><span class="result-value" id="rRows"></span></div>
  <div class="result-row"><span class="result-label">建議多買（+10%）</span><span class="result-value" id="rExtra"></span></div>
</div>
</div>
<script>
function calculate(){
  var patW=parseFloat(document.getElementById('patW').value);
  var patH=parseFloat(document.getElementById('patH').value);
  var qty=parseInt(document.getElementById('qty').value)||1;
  var fabW=parseFloat(document.getElementById('fabricW').value);
  var seam=parseFloat(document.getElementById('seam').value)||0;
  if(!patW||!patH||patW<=0||patH<=0){alert('請輸入有效的版型尺寸');return;}
  var effectiveW=patW+seam*2;
  var effectiveH=patH+seam*2;
  var perRow=Math.floor(fabW/effectiveW);
  if(perRow<1){perRow=1;}
  var rows=Math.ceil(qty/perRow);
  var totalLen=rows*effectiveH;
  var extra=totalLen*1.1;
  document.getElementById('rLen').textContent=Math.ceil(totalLen)+' cm（'+Math.ceil(totalLen/100*10)/10+' m）';
  document.getElementById('rPat').textContent=effectiveW.toFixed(1)+' × '+effectiveH.toFixed(1)+' cm';
  document.getElementById('rPerRow').textContent=perRow+' 件';
  document.getElementById('rRows').textContent=rows+' 排';
  document.getElementById('rExtra').textContent=Math.ceil(extra)+' cm（'+Math.ceil(extra/100*10)/10+' m）';
  document.getElementById('result').style.display='block';
}
</script>
