<div class="card">
<h1>螢幕 PPI 計算機</h1>
<p class="subtitle">解析度 + 螢幕尺寸 → PPI（像素密度）</p>
<label for="w">水平解析度（像素）</label>
<input type="number" id="w" placeholder="例如：1920" min="1" step="1">
<label for="h">垂直解析度（像素）</label>
<input type="number" id="h" placeholder="例如：1080" min="1" step="1">
<label for="size">螢幕尺寸（英吋，對角線）</label>
<input type="number" id="size" placeholder="例如：27" min="0.1" step="0.1">
<button class="calc-btn" onclick="calculate()">計算 PPI</button>
<div class="result" id="result">
  <div class="ppi-val" id="rPpi"></div>
  <div class="ppi-label">PPI（像素/英吋）</div>
  <div class="ppi-rank" id="rRank"></div>
  <div class="result-row"><span class="result-label">解析度</span><span class="result-value" id="rRes"></span></div>
  <div class="result-row"><span class="result-label">對角像素數</span><span class="result-value" id="rDiag"></span></div>
</div>
</div>
<script>
function calculate(){
  var w=parseFloat(document.getElementById('w').value);
  var h=parseFloat(document.getElementById('h').value);
  var s=parseFloat(document.getElementById('size').value);
  if(!w||!h||!s||w<=0||h<=0||s<=0){alert('請輸入有效數值');return;}
  var diag=Math.sqrt(w*w+h*h);
  var ppi=diag/s;
  var rank,color;
  if(ppi>=400){rank='頂級 Retina';color='#c44569';}
  else if(ppi>=250){rank='優秀（Retina 等級）';color='#4aad8e';}
  else if(ppi>=150){rank='良好';color='#4a8fd4';}
  else if(ppi>=100){rank='普通';color='#d4a520';}
  else{rank='偏低';color='#d05a5a';}
  document.getElementById('rPpi').textContent=Math.round(ppi);
  var rRank=document.getElementById('rRank');
  rRank.textContent=rank;rRank.style.background=color;
  document.getElementById('rRes').textContent=w+' × '+h;
  document.getElementById('rDiag').textContent=Math.round(diag)+' px';
  document.getElementById('result').style.display='block';
}
</script>
