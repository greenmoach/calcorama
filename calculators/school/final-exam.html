    <div class="card">
        <h1>及格分數倒推計算機</h1>
        <p class="subtitle">算出期末考至少需要幾分才能及格</p>

        <div class="form-group">
            <label>目前平均成績 <span class="hint">（作業、期中考等已知成績的加權平均）</span></label>
            <input type="number" id="currentAvg" placeholder="例如：72" min="0" max="100" step="any">
        </div>

        <div class="form-group">
            <label>期末考佔比 (%) <span class="hint">（期末考在總成績中的百分比）</span></label>
            <input type="number" id="finalWeight" placeholder="例如：40" min="0" max="100" step="any">
        </div>

        <div class="form-group">
            <label>目標總成績 <span class="hint">（想達到的最低分數）</span></label>
            <input type="number" id="targetGrade" value="60" min="0" max="100" step="any">
        </div>

        <button class="btn-calc" onclick="calculate()">計算所需分數</button>

        <div class="result-area" id="result">
            <div class="result-label">期末考至少需要</div>
            <div class="result-value" id="neededScore">--</div>
            <div id="statusBadge"></div>
            <div class="result-detail" id="detail"></div>
        </div>

        <div class="formula-box">
            <strong>計算公式：</strong><br>
            總成績 = 目前平均 × (1 - 期末佔比) + 期末分數 × 期末佔比<br>
            期末所需 = (目標總成績 - 目前平均 × (1 - 期末佔比)) ÷ 期末佔比
        </div>
    </div>
    <script>
        function calculate() {
            var currentAvg = parseFloat(document.getElementById('currentAvg').value);
            var finalWeightPct = parseFloat(document.getElementById('finalWeight').value);
            var target = parseFloat(document.getElementById('targetGrade').value);

            var resultEl = document.getElementById('result');
            resultEl.classList.add('show');

            if (isNaN(currentAvg) || isNaN(finalWeightPct) || isNaN(target)) {
                document.getElementById('neededScore').textContent = '--';
                document.getElementById('statusBadge').innerHTML = '';
                document.getElementById('detail').textContent = '請填寫所有欄位';
                return;
            }

            if (finalWeightPct <= 0 || finalWeightPct > 100) {
                document.getElementById('neededScore').textContent = '--';
                document.getElementById('statusBadge').innerHTML = '';
                document.getElementById('detail').textContent = '期末考佔比必須在 1% 到 100% 之間';
                return;
            }

            var fw = finalWeightPct / 100;
            var otherWeight = 1 - fw;

            // target = currentAvg * otherWeight + finalScore * fw
            // finalScore = (target - currentAvg * otherWeight) / fw
            var needed = (target - currentAvg * otherWeight) / fw;

            document.getElementById('neededScore').textContent = needed.toFixed(1);

            var badge = document.getElementById('statusBadge');
            var detail = document.getElementById('detail');

            if (needed <= 0) {
                badge.innerHTML = '<span class="result-status status-easy">不用考也能過！</span>';
                detail.textContent = '你目前的成績已經足以達到目標，期末考拿 0 分也能過關。繼續保持！';
            } else if (needed <= 60) {
                badge.innerHTML = '<span class="result-status status-ok">輕鬆達成</span>';
                detail.textContent = '只需要 ' + needed.toFixed(1) + ' 分，好好準備應該沒問題！';
            } else if (needed <= 85) {
                badge.innerHTML = '<span class="result-status status-ok">可以達成</span>';
                detail.textContent = '需要 ' + needed.toFixed(1) + ' 分，努力複習就能達到目標。';
            } else if (needed <= 100) {
                badge.innerHTML = '<span class="result-status status-hard">有挑戰性</span>';
                detail.textContent = '需要 ' + needed.toFixed(1) + ' 分，雖然困難但理論上可行，全力以赴吧！';
            } else {
                badge.innerHTML = '<span class="result-status status-impossible">無法達成</span>';
                detail.textContent = '即使期末考拿滿分 100 分，總成績也只能達到 ' +
                    (currentAvg * otherWeight + 100 * fw).toFixed(1) + ' 分，無法達到目標 ' + target + ' 分。';
            }
        }
    </script>
