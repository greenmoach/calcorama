    <div class="card">
        <h1>加權平均計算機</h1>
        <p class="subtitle">輸入數值與權重，計算加權平均值</p>
        <div class="header-row">
            <span>數值</span>
            <span>權重</span>
            <span></span>
        </div>
        <div id="dataList"></div>
        <div class="btn-group">
            <button class="btn btn-add" onclick="addRow()">+ 新增項目</button>
            <button class="btn btn-calc" onclick="calculate()">計算加權平均</button>
        </div>
        <div class="result-area" id="result">
            <div class="result-label">加權平均值</div>
            <div class="result-value" id="avgValue">--</div>
            <div class="result-detail" id="avgDetail"></div>
        </div>
    </div>
    <script>
        function addRow() {
            var list = document.getElementById('dataList');
            var row = document.createElement('div');
            row.className = 'data-row';

            var valInput = document.createElement('input');
            valInput.type = 'number';
            valInput.placeholder = '數值';
            valInput.step = 'any';
            valInput.className = 'val-input';

            var weightInput = document.createElement('input');
            weightInput.type = 'number';
            weightInput.placeholder = '權重';
            weightInput.step = 'any';
            weightInput.min = '0';
            weightInput.className = 'weight-input';

            var removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '\u00D7';
            removeBtn.onclick = function() { row.remove(); };

            row.appendChild(valInput);
            row.appendChild(weightInput);
            row.appendChild(removeBtn);
            list.appendChild(row);
        }

        function calculate() {
            var rows = document.querySelectorAll('.data-row');
            var sumVW = 0;
            var sumW = 0;
            var count = 0;
            for (var i = 0; i < rows.length; i++) {
                var v = parseFloat(rows[i].querySelector('.val-input').value);
                var w = parseFloat(rows[i].querySelector('.weight-input').value);
                if (isNaN(v) || isNaN(w) || w <= 0) continue;
                sumVW = sumVW + v * w;
                sumW = sumW + w;
                count++;
            }
            var resultEl = document.getElementById('result');
            resultEl.classList.add('show');
            if (sumW === 0 || count === 0) {
                document.getElementById('avgValue').textContent = '--';
                document.getElementById('avgDetail').textContent = '請至少輸入一組有效的數值與權重';
                return;
            }
            var avg = sumVW / sumW;
            document.getElementById('avgValue').textContent = avg.toFixed(2);
            document.getElementById('avgDetail').textContent = '有效項目數：' + count + ' ｜ 總權重：' + sumW.toFixed(2);
        }

        addRow();
        addRow();
        addRow();
    </script>
