    <div class="card">
        <h1>學期成績計算機</h1>
        <p class="subtitle">輸入各項成績與比重，計算學期總成績</p>

        <div class="form-row">
            <div class="form-group">
                <label>期中考成績</label>
                <input type="number" id="midScore" placeholder="0 - 100" min="0" max="100" step="any">
            </div>
            <div class="form-group">
                <label>比重 (%)</label>
                <input type="number" id="midWeight" value="30" min="0" max="100" step="any">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>期末考成績</label>
                <input type="number" id="finalScore" placeholder="0 - 100" min="0" max="100" step="any">
            </div>
            <div class="form-group">
                <label>比重 (%)</label>
                <input type="number" id="finalWeight" value="40" min="0" max="100" step="any">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>平時成績</label>
                <input type="number" id="regularScore" placeholder="0 - 100" min="0" max="100" step="any">
            </div>
            <div class="form-group">
                <label>比重 (%)</label>
                <input type="number" id="regularWeight" value="30" min="0" max="100" step="any">
            </div>
        </div>

        <p class="weight-hint">提示：各項比重總和應為 100%</p>

        <button class="btn-calc" onclick="calculate()">計算學期成績</button>

        <div class="result-area" id="result">
            <div class="result-label">學期總成績</div>
            <div class="result-value" id="totalScore">--</div>
            <div id="statusBadge"></div>
            <div class="result-detail" id="detail"></div>
        </div>
    </div>
    <script>
        function calculate() {
            var midScore = parseFloat(document.getElementById('midScore').value);
            var finalScore = parseFloat(document.getElementById('finalScore').value);
            var regularScore = parseFloat(document.getElementById('regularScore').value);
            var midWeight = parseFloat(document.getElementById('midWeight').value);
            var finalWeight = parseFloat(document.getElementById('finalWeight').value);
            var regularWeight = parseFloat(document.getElementById('regularWeight').value);

            var resultEl = document.getElementById('result');
            resultEl.classList.add('show');

            if (isNaN(midScore) || isNaN(finalScore) || isNaN(regularScore)) {
                document.getElementById('totalScore').textContent = '--';
                document.getElementById('statusBadge').innerHTML = '';
                document.getElementById('detail').textContent = '請填寫所有成績欄位';
                return;
            }
            if (isNaN(midWeight) || isNaN(finalWeight) || isNaN(regularWeight)) {
                document.getElementById('totalScore').textContent = '--';
                document.getElementById('statusBadge').innerHTML = '';
                document.getElementById('detail').textContent = '請填寫所有比重欄位';
                return;
            }

            var totalWeight = midWeight + finalWeight + regularWeight;
            if (totalWeight <= 0) {
                document.getElementById('totalScore').textContent = '--';
                document.getElementById('statusBadge').innerHTML = '';
                document.getElementById('detail').textContent = '比重總和必須大於 0';
                return;
            }

            var total = (midScore * midWeight + finalScore * finalWeight + regularScore * regularWeight) / totalWeight;

            document.getElementById('totalScore').textContent = total.toFixed(1);

            var badge = document.getElementById('statusBadge');
            if (total >= 60) {
                badge.innerHTML = '<span class="result-status status-pass">PASS 及格</span>';
            } else {
                badge.innerHTML = '<span class="result-status status-fail">FAIL 不及格</span>';
            }

            var weightNote = '';
            if (Math.abs(totalWeight - 100) > 0.01) {
                weightNote = '（注意：比重總和為 ' + totalWeight.toFixed(1) + '%，非 100%，已自動按比例計算）';
            }
            document.getElementById('detail').textContent =
                '期中 ' + midScore + '×' + midWeight + '% + 期末 ' + finalScore + '×' + finalWeight + '% + 平時 ' + regularScore + '×' + regularWeight + '%' +
                (weightNote ? '\n' + weightNote : '');
        }
    </script>
