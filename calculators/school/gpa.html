    <div class="floating"></div>

    <div class="floating"></div>
    <div class="card">
        <h1>GPA 計算機</h1>
        <p class="subtitle">輸入課程資訊，計算學期 GPA</p>
        <div class="header-row">
            <span>課程名稱</span>
            <span>學分</span>
            <span>成績</span>
            <span></span>
        </div>
        <div id="courseList"></div>
        <div class="btn-group">
            <button class="btn btn-add" onclick="addRow()">+ 新增課程</button>
            <button class="btn btn-calc" onclick="calculate()">計算 GPA</button>
        </div>
        <div class="result-area" id="result">
            <div class="result-label">你的 GPA</div>
            <div class="result-value" id="gpaValue">--</div>
            <div class="result-detail" id="gpaDetail"></div>
        </div>
    </div>
    <script>
        var gradeMap = {
            'A+': 4.3, 'A': 4.0, 'A-': 3.7,
            'B+': 3.3, 'B': 3.0, 'B-': 2.7,
            'C+': 2.3, 'C': 2.0, 'C-': 1.7,
            'D': 1.0, 'F': 0
        };
        var gradeOptions = Object.keys(gradeMap);

        function createSelect() {
            var sel = document.createElement('select');
            var defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.textContent = '選擇成績';
            defaultOpt.disabled = true;
            defaultOpt.selected = true;
            sel.appendChild(defaultOpt);
            for (var i = 0; i < gradeOptions.length; i++) {
                var opt = document.createElement('option');
                opt.value = gradeOptions[i];
                opt.textContent = gradeOptions[i] + ' (' + gradeMap[gradeOptions[i]].toFixed(1) + ')';
                sel.appendChild(opt);
            }
            return sel;
        }

        function addRow() {
            var list = document.getElementById('courseList');
            var row = document.createElement('div');
            row.className = 'course-row';

            var nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = '課程名稱';
            nameInput.className = 'name-input';

            var creditInput = document.createElement('input');
            creditInput.type = 'number';
            creditInput.placeholder = '學分';
            creditInput.min = '0';
            creditInput.step = '1';
            creditInput.className = 'credit-input';

            var sel = createSelect();

            var removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '\u00D7';
            removeBtn.onclick = function() {
                row.remove();
            };

            row.appendChild(nameInput);
            row.appendChild(creditInput);
            row.appendChild(sel);
            row.appendChild(removeBtn);
            list.appendChild(row);
        }

        function calculate() {
            var rows = document.querySelectorAll('.course-row');
            var totalPoints = 0;
            var totalCredits = 0;
            for (var i = 0; i < rows.length; i++) {
                var credit = parseFloat(rows[i].querySelector('.credit-input').value);
                var grade = rows[i].querySelector('select').value;
                if (isNaN(credit) || credit <= 0 || !grade || !(grade in gradeMap)) continue;
                totalPoints = totalPoints + credit * gradeMap[grade];
                totalCredits = totalCredits + credit;
            }
            var resultEl = document.getElementById('result');
            resultEl.classList.add('show');
            if (totalCredits === 0) {
                document.getElementById('gpaValue').textContent = '--';
                document.getElementById('gpaDetail').textContent = '請至少輸入一門有效課程';
                return;
            }
            var gpa = totalPoints / totalCredits;
            document.getElementById('gpaValue').textContent = gpa.toFixed(2);
            document.getElementById('gpaDetail').textContent = '總學分數：' + totalCredits + ' ｜ 加權總積分：' + totalPoints.toFixed(1);
        }

        // Initialize with 3 rows
        addRow();
        addRow();
        addRow();
    </script>
