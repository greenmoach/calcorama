<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>AA 制分帳計算機</h1>
<p class="subtitle">總金額 ÷ 人數，含小費分帳</p>
<label for="total">總金額（元）</label>
<input type="number" id="total" placeholder="例如：2400" min="0" step="any">
<label for="people">人數</label>
<input type="number" id="people" placeholder="例如：4" min="1" step="1">
<label for="tip">小費比例（%，可留 0）</label>
<input type="number" id="tip" placeholder="例如：10" min="0" max="100" step="any" value="0">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="highlight" id="rPer"></div>
  <div class="result-row"><span class="result-label">原始帳單</span><span class="result-value" id="rBill"></span></div>
  <div class="result-row"><span class="result-label">小費金額</span><span class="result-value" id="rTip"></span></div>
  <div class="result-row"><span class="result-label">總計</span><span class="result-value" id="rTotal"></span></div>
  <div class="result-row"><span class="result-label">人數</span><span class="result-value" id="rPeople"></span></div>
</div>
</div>
<script>
function calculate(){
  var total=parseFloat(document.getElementById('total').value);
  var people=parseInt(document.getElementById('people').value);
  var tip=parseFloat(document.getElementById('tip').value)||0;
  if(isNaN(total)||total<0||!people||people<1){alert('請輸入有效數值');return;}
  var tipAmt=total*tip/100;
  var grand=total+tipAmt;
  var per=grand/people;
  document.getElementById('rPer').textContent='每人 $'+fmt(per);
  document.getElementById('rBill').textContent='$'+fmt(total);
  document.getElementById('rTip').textContent='$'+fmt(tipAmt);
  document.getElementById('rTotal').textContent='$'+fmt(grand);
  document.getElementById('rPeople').textContent=people+' 人';
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n*100)/100;}
</script>
