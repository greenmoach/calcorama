body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#e8d0f0 0%,#d4b0e0 30%,#c9a0dc 60%,#b088c8 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}

<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>信用卡循環利息</h1>
<p class="subtitle">最低應繳 → 實際利息成本</p>
<label for="balance">欠款餘額（元）</label>
<input type="number" id="balance" placeholder="例如：50000" min="0" step="any">
<label for="rate">年利率（%，通常 10%~20%）</label>
<input type="number" id="rate" placeholder="例如：15" min="0" step="any" value="15">
<label for="minPct">最低應繳比例（%）</label>
<input type="number" id="minPct" placeholder="例如：10" min="1" max="100" step="any" value="10">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="result-row"><span class="result-label">本月最低應繳</span><span class="result-value" id="rMin"></span></div>
  <div class="result-row"><span class="result-label">本月利息</span><span class="result-value" id="rInterest"></span></div>
  <div class="result-row"><span class="result-label">實際還款金額（本金）</span><span class="result-value" id="rPrin"></span></div>
  <div class="result-row"><span class="result-label">預估還清月數</span><span class="result-value" id="rMonths"></span></div>
  <div class="result-row"><span class="result-label">預估總利息</span><span class="result-value" id="rTotalInt"></span></div>
  <div class="warn">⚠️ 建議每月多還本金，可大幅減少利息支出</div>
</div>
</div>
<script>
function calculate(){
  var bal=parseFloat(document.getElementById('balance').value);
  var annualRate=parseFloat(document.getElementById('rate').value);
  var minPct=parseFloat(document.getElementById('minPct').value);
  if(isNaN(bal)||isNaN(annualRate)||isNaN(minPct)||bal<=0){alert('請輸入有效數值');return;}
  var monthlyRate=annualRate/100/12;
  var interest=bal*monthlyRate;
  var minPayment=bal*minPct/100;
  var principal=minPayment-interest;
  var months=0,totalInt=0,b=bal;
  while(b>0.01&&months<600){
    var i=b*monthlyRate;totalInt+=i;
    var pay=Math.max(b*minPct/100,50);
    b=b+i-pay;months++;
    if(b<0)b=0;
  }
  document.getElementById('rMin').textContent='$'+fmt(minPayment);
  document.getElementById('rInterest').textContent='$'+fmt(interest);
  document.getElementById('rPrin').textContent='$'+fmt(Math.max(0,principal));
  document.getElementById('rMonths').textContent=months>=600?'超過50年':months+' 個月（約 '+Math.ceil(months/12)+' 年）';
  document.getElementById('rTotalInt').textContent='$'+fmt(totalInt);
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
</script>
