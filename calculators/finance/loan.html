<div class="card">
<h1>貸款月付金計算機</h1>
<p class="subtitle">計算每月應繳金額</p>
<label for="principal">貸款金額（元）</label>
<input type="number" id="principal" placeholder="例如：1000000" min="0" step="any">
<label for="rate">年利率（%）</label>
<input type="number" id="rate" placeholder="例如：3.5" min="0" step="any">
<label for="term">貸款期數（月）</label>
<input type="number" id="term" placeholder="例如：240（20年）" min="1" step="1">
<button class="calc-btn" onclick="calculate()">計算月付金</button>
<div class="result" id="result">
<div class="highlight" id="monthly"></div>
<div class="result-row"><span class="result-label">貸款金額</span><span class="result-value" id="rPrincipal"></span></div>
<div class="result-row"><span class="result-label">總還款金額</span><span class="result-value" id="rTotal"></span></div>
<div class="result-row"><span class="result-label">總利息</span><span class="result-value" id="rInterest"></span></div>
</div>
</div>
<script>
function calculate(){
  var P=parseFloat(document.getElementById('principal').value);
  var annualRate=parseFloat(document.getElementById('rate').value);
  var n=parseInt(document.getElementById('term').value);
  if(isNaN(P)||isNaN(annualRate)||isNaN(n)||P<=0||n<=0)return;
  var r=annualRate/100/12;
  var monthly;
  if(r===0){monthly=P/n}
  else{monthly=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)}
  var total=monthly*n;
  var interest=total-P;
  document.getElementById('monthly').textContent='每月付款 $'+fmt(monthly);
  document.getElementById('rPrincipal').textContent='$'+fmt(P);
  document.getElementById('rTotal').textContent='$'+fmt(total);
  document.getElementById('rInterest').textContent='$'+fmt(interest);
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
</script>
