<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>折扣計算機</h1>
<p class="subtitle">原價 × 折扣 → 最終價格</p>
<label for="price">原價（元）</label>
<input type="number" id="price" placeholder="例如：1200" min="0" step="any">
<label for="discount">折扣（%）</label>
<input type="number" id="discount" placeholder="例如：20（代表打八折）" min="0" max="100" step="any">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="highlight" id="rFinal"></div>
  <div class="result-row"><span class="result-label">原價</span><span class="result-value" id="rPrice"></span></div>
  <div class="result-row"><span class="result-label">折扣</span><span class="result-value" id="rDiscount"></span></div>
  <div class="result-row"><span class="result-label">省下金額</span><span class="result-value saved" id="rSaved"></span></div>
</div>
</div>
<script>
function calculate(){
  var price=parseFloat(document.getElementById('price').value);
  var disc=parseFloat(document.getElementById('discount').value);
  if(isNaN(price)||isNaN(disc)||price<0||disc<0||disc>100){alert('請輸入有效數值');return;}
  var saved=price*disc/100;
  var final=price-saved;
  document.getElementById('rFinal').textContent='最終價格 $'+fmt(final);
  document.getElementById('rPrice').textContent='$'+fmt(price);
  document.getElementById('rDiscount').textContent=disc+'% off';
  document.getElementById('rSaved').textContent='省 $'+fmt(saved);
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n*100)/100;}
</script>
