<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>匯率計算機</h1>
<p class="subtitle">快速換算各國貨幣匯率</p>
<div class="row">
<div>
<label for="fromCurrency">從</label>
<select id="fromCurrency"></select>
</div>
<div>
<label for="toCurrency">到</label>
<select id="toCurrency"></select>
</div>
</div>
<button class="swap-btn" onclick="swapCurrency()" title="交換貨幣">&#8645;</button>
<div style="margin-bottom:18px">
<label for="amount">金額</label>
<input type="number" id="amount" placeholder="輸入金額" min="0" step="any">
</div>
<button class="calc-btn" onclick="calculate()">換算</button>
<div class="result" id="result">
<div class="amount" id="resultAmount"></div>
<div class="detail" id="resultDetail"></div>
</div>
</div>
<script>
const rates={USD:1,TWD:31.5,EUR:0.92,JPY:149.8,GBP:0.79,CNY:7.24,KRW:1330};
const names={USD:'美元 USD',TWD:'新台幣 TWD',EUR:'歐元 EUR',JPY:'日圓 JPY',GBP:'英鎊 GBP',CNY:'人民幣 CNY',KRW:'韓元 KRW'};
function populateSelects(){
  var keys=Object.keys(rates);
  var s1=document.getElementById('fromCurrency'),s2=document.getElementById('toCurrency');
  keys.forEach(function(k){
    s1.appendChild(new Option(names[k],k));
    s2.appendChild(new Option(names[k],k));
  });
  s1.value='USD';s2.value='TWD';
}
populateSelects();
function swapCurrency(){
  var s1=document.getElementById('fromCurrency'),s2=document.getElementById('toCurrency');
  var t=s1.value;s1.value=s2.value;s2.value=t;
}
function calculate(){
  var amt=parseFloat(document.getElementById('amount').value);
  if(isNaN(amt)||amt<0)return;
  var from=document.getElementById('fromCurrency').value;
  var to=document.getElementById('toCurrency').value;
  var inUSD=amt/rates[from];
  var result=inUSD*rates[to];
  document.getElementById('resultAmount').textContent=formatNum(result)+' '+to;
  document.getElementById('resultDetail').textContent=formatNum(amt)+' '+from+' = '+formatNum(result)+' '+to+'\n匯率: 1 '+from+' = '+formatNum(rates[to]/rates[from])+' '+to;
  document.getElementById('result').style.display='block';
}
function formatNum(n){return n.toLocaleString('zh-TW',{minimumFractionDigits:2,maximumFractionDigits:4})}
</script>
