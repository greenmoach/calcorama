<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(135deg,#e8d0f0 0%,#d4b0e0 30%,#c9a0dc 60%,#b088c8 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
.floating{position:fixed;border-radius:50%;opacity:.12;pointer-events:none;animation:floatAnim 6s ease-in-out infinite}
.floating:nth-child(1){width:120px;height:120px;background:#9b59b6;top:10%;left:5%;animation-delay:0s}
.floating:nth-child(2){width:80px;height:80px;background:#8e44ad;top:60%;right:8%;animation-delay:2s}
.floating:nth-child(3){width:60px;height:60px;background:#a569bd;bottom:15%;left:15%;animation-delay:4s}
@keyframes floatAnim{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;box-shadow:0 8px 32px rgba(120,60,160,.18);padding:40px 36px;max-width:480px;width:100%;position:relative;z-index:2}
h1{text-align:center;color:#6a3d7d;font-size:1.65rem;font-weight:800;margin-bottom:8px}
.subtitle{text-align:center;color:#9b7fb5;font-size:.9rem;margin-bottom:28px}
label{display:block;color:#6a3d7d;font-weight:700;margin-bottom:6px;font-size:.9rem}
input{width:100%;padding:12px 16px;border:2px solid #d8c0e8;border-radius:14px;font-size:1rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .3s;background:#faf5ff;color:#4a2d5e;margin-bottom:18px}
input:focus{border-color:#9b59b6}
.tip-btns{display:flex;gap:8px;margin-bottom:18px}
.tip-btn{flex:1;padding:10px;background:rgba(155,89,182,.12);border:2px solid #d8c0e8;border-radius:12px;color:#6a3d7d;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.9rem;transition:all .2s}
.tip-btn:hover,.tip-btn.active{background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;border-color:transparent}
.calc-btn{width:100%;padding:14px;background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;border:none;border-radius:14px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .2s,box-shadow .2s}
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(142,68,173,.35)}
.result{margin-top:22px;background:linear-gradient(135deg,#f3e8fa,#ead0f5);border-radius:16px;padding:22px;display:none}

.result-row:last-child{border-bottom:none}

.result-value{color:#6a3d7d;font-weight:800;font-size:1.05rem}

<a href="../../index.html" style="position:fixed;top:18px;left:18px;z-index:10;color:#8e6aaf;text-decoration:none;font-weight:700;font-size:0.95rem;">&#10094; 返回首頁</a>
<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>小費計算機</h1>
<p class="subtitle">帳單金額 + 小費比例 = 總計</p>
<label for="bill">帳單金額（元）</label>
<input type="number" id="bill" placeholder="例如：850" min="0" step="any">
<label>小費比例（快選）</label>
<div class="tip-btns">
  <button class="tip-btn" onclick="setTip(10,this)">10%</button>
  <button class="tip-btn" onclick="setTip(15,this)">15%</button>
  <button class="tip-btn active" onclick="setTip(18,this)">18%</button>
  <button class="tip-btn" onclick="setTip(20,this)">20%</button>
</div>
<label for="tipPct">自訂小費（%）</label>
<input type="number" id="tipPct" value="18" min="0" max="100" step="any">
<label for="people">人數</label>
<input type="number" id="people" value="1" min="1" step="1">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="highlight" id="rTotal"></div>
  <div class="result-row"><span class="result-label">帳單</span><span class="result-value" id="rBill"></span></div>
  <div class="result-row"><span class="result-label">小費</span><span class="result-value" id="rTip"></span></div>
  <div class="result-row"><span class="result-label">每人應付</span><span class="result-value" id="rPer"></span></div>
</div>
</div>
<script>
function setTip(v,btn){
  document.getElementById('tipPct').value=v;
  document.querySelectorAll('.tip-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
function calculate(){
  var bill=parseFloat(document.getElementById('bill').value);
  var pct=parseFloat(document.getElementById('tipPct').value);
  var people=parseInt(document.getElementById('people').value)||1;
  if(isNaN(bill)||bill<0){alert('請輸入有效帳單金額');return;}
  var tip=bill*pct/100;
  var total=bill+tip;
  document.getElementById('rTotal').textContent='總計 $'+fmt(total);
  document.getElementById('rBill').textContent='$'+fmt(bill);
  document.getElementById('rTip').textContent='$'+fmt(tip)+' ('+pct+'%)';
  document.getElementById('rPer').textContent='$'+fmt(total/people)+' / 人';
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n*100)/100;}
</script>
