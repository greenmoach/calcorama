<div class="card">
<h1>通膨計算機</h1>
<p class="subtitle">購買力換算 / 未來等值金額</p>
<label for="amount">今日金額（元）</label>
<input type="number" id="amount" placeholder="例如：10000" min="0" step="any">
<label for="years">年數</label>
<input type="number" id="years" placeholder="例如：20" min="1" step="1">
<label for="inflRate">年通膨率（%）</label>
<input type="number" id="inflRate" placeholder="例如：2" min="0" step="any" value="2">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="highlight" id="rFuture"></div>
  <div class="result-row"><span class="result-label">今日金額</span><span class="result-value" id="rNow"></span></div>
  <div class="result-row"><span class="result-label">購買力下降</span><span class="result-value" id="rLoss"></span></div>
  <div class="result-row"><span class="result-label">維持購買力需要</span><span class="result-value" id="rFuture2"></span></div>
  <div class="result-row"><span class="result-label">累積通膨率</span><span class="result-value" id="rTotal"></span></div>
</div>
</div>
<script>
function calculate(){
  var amount=parseFloat(document.getElementById('amount').value);
  var years=parseInt(document.getElementById('years').value);
  var rate=parseFloat(document.getElementById('inflRate').value)/100;
  if(isNaN(amount)||isNaN(years)||isNaN(rate)||amount<=0||years<=0){alert('請輸入有效數值');return;}
  var future=amount*Math.pow(1+rate,years);
  var loss=future-amount;
  var totalRate=(Math.pow(1+rate,years)-1)*100;
  var realValue=amount/Math.pow(1+rate,years);
  document.getElementById('rFuture').textContent=years+'年後等值 $'+fmt(future);
  document.getElementById('rNow').textContent='$'+fmt(amount);
  document.getElementById('rLoss').textContent='購買力剩 $'+fmt(realValue)+'（損失 '+Math.round(totalRate)+'%）';
  document.getElementById('rFuture2').textContent='$'+fmt(future);
  document.getElementById('rTotal').textContent=totalRate.toFixed(1)+'%';
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
</script>
