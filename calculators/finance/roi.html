<div class="floating"></div><div class="floating"></div><div class="floating"></div>
<div class="card">
<h1>投資報酬率計算機</h1>
<p class="subtitle">計算 ROI 與淨損益</p>
<label for="initial">初始投資金額（元）</label>
<input type="number" id="initial" placeholder="例如：100000" min="0" step="any">
<label for="final">最終價值（元）</label>
<input type="number" id="final" placeholder="例如：135000" min="0" step="any">
<button class="calc-btn" onclick="calculate()">計算 ROI</button>
<div class="result" id="result">
<div class="highlight" id="roi"></div>
<div class="result-row"><span class="result-label">初始投資</span><span class="result-value" id="rInitial"></span></div>
<div class="result-row"><span class="result-label">最終價值</span><span class="result-value" id="rFinal"></span></div>
<div class="result-row"><span class="result-label">淨損益</span><span class="result-value" id="rNet"></span></div>
</div>
</div>
<script>
function calculate(){
  var ini=parseFloat(document.getElementById('initial').value);
  var fin=parseFloat(document.getElementById('final').value);
  if(isNaN(ini)||isNaN(fin)||ini<=0)return;
  var net=fin-ini;
  var roi=(net/ini)*100;
  var el=document.getElementById('roi');
  el.textContent='ROI: '+(roi>=0?'+':'')+roi.toFixed(2)+'%';
  el.className='highlight '+(roi>=0?'profit':'loss');
  document.getElementById('rInitial').textContent='$'+fmt(ini);
  document.getElementById('rFinal').textContent='$'+fmt(fin);
  var netEl=document.getElementById('rNet');
  netEl.textContent=(net>=0?'+':'')+' $'+fmt(Math.abs(net));
  netEl.style.color=net>=0?'#27ae60':'#e74c3c';
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
</script>
