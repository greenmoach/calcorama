<div class="card">
<h1>房貸計算機</h1>
<p class="subtitle">房屋貸款月付金與攤還明細</p>
<label for="price">房屋總價（元）</label>
<input type="number" id="price" placeholder="例如：10000000" min="0" step="any">
<div class="row">
<div>
<label for="downPct">頭期款（%）</label>
<input type="number" id="downPct" placeholder="例如：20" min="0" max="100" step="any">
</div>
<div>
<label for="rate">年利率（%）</label>
<input type="number" id="rate" placeholder="例如：2.1" min="0" step="any">
</div>
</div>
<label for="years">貸款年數</label>
<input type="number" id="years" placeholder="例如：30" min="1" step="1">
<button class="calc-btn" onclick="calculate()">計算房貸</button>
<div class="result" id="result">
<div class="highlight" id="monthly"></div>
<div class="result-row"><span class="result-label">貸款金額</span><span class="result-value" id="rLoan"></span></div>
<div class="result-row"><span class="result-label">頭期款</span><span class="result-value" id="rDown"></span></div>
<div class="result-row"><span class="result-label">總還款金額</span><span class="result-value" id="rTotal"></span></div>
<div class="result-row"><span class="result-label">總利息</span><span class="result-value" id="rInterest"></span></div>
<div class="schedule" id="schedule"></div>
</div>
</div>
<script>
function calculate(){
  var price=parseFloat(document.getElementById('price').value);
  var downPct=parseFloat(document.getElementById('downPct').value);
  var annualRate=parseFloat(document.getElementById('rate').value);
  var years=parseInt(document.getElementById('years').value);
  if(isNaN(price)||isNaN(downPct)||isNaN(annualRate)||isNaN(years)||price<=0||years<=0)return;
  var down=price*downPct/100;
  var P=price-down;
  var n=years*12;
  var r=annualRate/100/12;
  var monthly;
  if(r===0){monthly=P/n}else{monthly=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)}
  var total=monthly*n;
  var interest=total-P;
  document.getElementById('monthly').textContent='每月付款 $'+fmt(monthly);
  document.getElementById('rLoan').textContent='$'+fmt(P);
  document.getElementById('rDown').textContent='$'+fmt(down);
  document.getElementById('rTotal').textContent='$'+fmt(total);
  document.getElementById('rInterest').textContent='$'+fmt(interest);
  // Amortization schedule first 12 months
  var html='<table><tr><th>月</th><th>月付金</th><th>本金</th><th>利息</th><th>餘額</th></tr>';
  var balance=P;
  var limit=Math.min(12,n);
  for(var i=1;i<=limit;i++){
    var intPart=balance*r;
    var prinPart=monthly-intPart;
    balance-=prinPart;
    if(balance<0)balance=0;
    html+='<tr><td>'+i+'</td><td>$'+fmt(monthly)+'</td><td>$'+fmt(prinPart)+'</td><td>$'+fmt(intPart)+'</td><td>$'+fmt(balance)+'</td></tr>';
  }
  html+='</table>';
  document.getElementById('schedule').innerHTML='<p style="color:#6a3d7d;font-weight:700;margin-bottom:8px">攤還明細（前12期）</p>'+html;
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
</script>
