<div class="card">
<h1>退休金計算機</h1>
<p class="subtitle">退休需要準備多少錢</p>
<label for="age">目前年齡</label>
<input type="number" id="age" placeholder="例如：30" min="18" max="80" step="1">
<label for="retireAge">預計退休年齡</label>
<input type="number" id="retireAge" placeholder="例如：65" min="40" max="90" step="1">
<label for="lifeExp">預期壽命</label>
<input type="number" id="lifeExp" placeholder="例如：85" min="50" max="120" step="1">
<label for="monthly">退休後每月所需（元）</label>
<input type="number" id="monthly" placeholder="例如：40000" min="0" step="any">
<label for="returnRate">預期投資報酬率（%/年）</label>
<input type="number" id="returnRate" placeholder="例如：5" min="0" step="any" value="5">
<button class="calc-btn" onclick="calculate()">計算</button>
<div class="result" id="result">
  <div class="highlight" id="rNeed"></div>
  <div class="result-row"><span class="result-label">退休後年數</span><span class="result-value" id="rYears"></span></div>
  <div class="result-row"><span class="result-label">距退休剩餘年數</span><span class="result-value" id="rLeft"></span></div>
  <div class="result-row"><span class="result-label">每月需儲蓄</span><span class="result-value" id="rSave"></span></div>
</div>
</div>
<script>
function calculate(){
  var age=parseInt(document.getElementById('age').value);
  var retireAge=parseInt(document.getElementById('retireAge').value);
  var lifeExp=parseInt(document.getElementById('lifeExp').value);
  var monthly=parseFloat(document.getElementById('monthly').value);
  var r=parseFloat(document.getElementById('returnRate').value)/100;
  if(!age||!retireAge||!lifeExp||!monthly||retireAge<=age||lifeExp<=retireAge){alert('請輸入有效數值');return;}
  var retireYears=lifeExp-retireAge;
  var yearsLeft=retireAge-age;
  var annualNeed=monthly*12;
  var totalNeed;
  if(r===0){totalNeed=annualNeed*retireYears;}
  else{var mr=r/12;var n=retireYears*12;totalNeed=monthly*(1-Math.pow(1+mr,-n))/mr;}
  var monthlyR=r/12;
  var nm=yearsLeft*12;
  var monthlySave;
  if(r===0){monthlySave=totalNeed/nm;}
  else{monthlySave=totalNeed*monthlyR/(Math.pow(1+monthlyR,nm)-1);}
  document.getElementById('rNeed').textContent='需準備 $'+fmt(totalNeed);
  document.getElementById('rYears').textContent=retireYears+' 年';
  document.getElementById('rLeft').textContent=yearsLeft+' 年';
  document.getElementById('rSave').textContent='$'+fmt(monthlySave)+' / 月';
  document.getElementById('result').style.display='block';
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
</script>
